[advisories]
# Scope selectors: "all", "workspace", "transitive", "none"
# "workspace" = flag advisories only for crates you directly depend on
unmaintained = "workspace"
# Lint level for yanked crates: "allow", "warn", "deny"
yanked = "warn"
# Advisory IDs or crate@version entries to suppress (RUSTSEC-YYYY-NNNN)
ignore = []

[licenses]
# Minimum confidence for inferring license text (0.0–1.0)
confidence-threshold = 0.92
# Any license not listed here is implicitly denied.
# GPL-2.0, GPL-3.0, AGPL-3.0 are excluded by omission.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    # Unicode License v3 — used by ICU crates (icu_collections, icu_properties,
    # icu_normalizer, yoke, zerovec, …) pulled in transitively via utoipa-swagger-ui
    "Unicode-3.0",
    # CC0-1.0 — public domain dedication used by notify 6.x
    "CC0-1.0",
    # MPL-2.0 — weak copyleft, compatible with Apache-2.0; used by option-ext (dirs dependency)
    "MPL-2.0",
    # BSL-1.0 — Boost Software License 1.0, OSI-approved permissive license;
    # used by xxhash-rust (transitive dep of redis 1.x under redis-cache feature)
    "BSL-1.0",
]

[[licenses.exceptions]]
# webpki-roots ships Mozilla's CA certificate bundle under a permissive data
# license; allow it only for this specific crate.
crate = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

[bans]
# Warn when the same crate appears at multiple versions in the graph
multiple-versions = "warn"
# Workspace-internal path dependencies carry no version constraint by design;
# set to "allow" so cargo-deny does not flag them as wildcard dependencies.
wildcards = "allow"
# Crates that must never appear in the dependency graph
deny = [
    { crate = "openssl", use-instead = "rustls" },
]

[sources]
# Deny dependencies from unknown crate registries
unknown-registry = "deny"
# Deny dependencies from unknown git sources
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
