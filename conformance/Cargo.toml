[package]
name = "conformance"
version.workspace = true
publish = false  # AAASM-2340: not a transitive dep of aa-cli
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Language-neutral conformance test suite for the Agent Assembly protocol"

[dependencies]
aa-core = { path = "../aa-core", features = ["std"] }
aa-proto = { path = "../aa-proto" }
prost = "0.14"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
aa-core = { path = "../aa-core", features = ["std"] }
aa-security = { path = "../aa-security" }
aa-proto = { path = "../aa-proto" }

[lints]
workspace = true
