[package]
name = "aa-storage-redis"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Redis L2 shared-cache storage driver (SessionStore, RateLimitCounter, PolicyStore) for Agent Assembly"

[dependencies]
# Trait contract — the storage traits live in `aa-core::storage` and are
# re-exported verbatim by the `aa-storage` facade.
aa-storage = { path = "../aa-storage", version = "0.0.1-alpha.8" }
# Pulled in only to enable `aa-core`'s `serde` feature so `PolicyDocument`
# (re-exported through `aa-storage`) gains `Serialize`/`Deserialize`, which the
# JSON-backed `RedisPolicyStore` needs. No `aa-core` items are named directly.
aa-core = { path = "../aa-core", version = "0.0.1-alpha.8", features = ["serde"] }

async-trait = { workspace = true }
# `redis = 1.2` matches the workspace pin. `tokio-rustls-comp` backs the
# `[storage.redis].tls` toggle (`rediss://` URLs).
redis = { workspace = true, features = ["aio", "tokio-comp", "tokio-rustls-comp", "script"] }
# Connection pooling. `0.23` requires `redis ^1.0.3`, satisfied by the workspace pin.
deadpool-redis = { version = "0.23", features = ["rt_tokio_1"] }
serde = { workspace = true }
serde_json = { workspace = true }
# `toml` (same pin as `aa-storage`) backs the driver-factory signatures,
# which take the `[storage.redis]` subsection as a `toml::Value`.
toml = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
# Redis container for the trait-conformance suite. Re-exports `testcontainers`.
testcontainers-modules = { workspace = true, features = ["redis"] }
# Second driver for the mixed-config registry-integration test (redis backs the
# L2 kinds; memory backs the durable kinds).
aa-storage-memory = { path = "../aa-storage-memory", version = "0.0.1-alpha.8" }

[lints]
workspace = true
