[package]
name = "aa-storage-redis"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Redis L2 shared-cache storage driver (SessionStore, RateLimitCounter, PolicyStore) for Agent Assembly"

[dependencies]
# Trait contract — the storage traits live in `aa-core::storage` and are
# re-exported verbatim by the `aa-storage` facade.
aa-storage = { path = "../aa-storage" }
# Pulled in only to enable `aa-core`'s `serde` feature so `PolicyDocument`
# (re-exported through `aa-storage`) gains `Serialize`/`Deserialize`, which the
# JSON-backed `RedisPolicyStore` needs. No `aa-core` items are named directly.
aa-core = { path = "../aa-core", features = ["serde"] }

async-trait = "0.1"
# `redis = 1.2` matches the pin already used by `aa-gateway`. `tokio-rustls-comp`
# backs the `[storage.redis].tls` toggle (`rediss://` URLs).
redis = { version = "1.2", default-features = false, features = ["aio", "tokio-comp", "tokio-rustls-comp", "script"] }
# Connection pooling. `0.23` requires `redis ^1.0.3`, satisfied by the pin above.
deadpool-redis = { version = "0.23", features = ["rt_tokio_1"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `toml` (same 0.9 pin as `aa-storage`) backs the driver-factory signatures,
# which take the `[storage.redis]` subsection as a `toml::Value`.
toml = "1.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
# Redis container for the trait-conformance suite. Re-exports `testcontainers`.
testcontainers-modules = { version = "0.15", features = ["redis"] }
# Second driver for the mixed-config registry-integration test (redis backs the
# L2 kinds; memory backs the durable kinds).
aa-storage-memory = { path = "../aa-storage-memory" }

[lints]
workspace = true
