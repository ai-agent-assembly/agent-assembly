# Why Codecov and SonarCloud report slightly different coverage percentages
# ------------------------------------------------------------------------------
# Both tools now consume the SAME underlying data: the single `lcov.info` that
# the ci.yml Coverage job produces from one `cargo llvm-cov` run. Codecov reads
# `lcov.info` directly (see the "Upload to Codecov" step); SonarCloud reads the
# same file via `sonar.rust.lcov.reportPaths=lcov.info` in
# `sonar-project.properties`. Neither tool is fed a stale or divergent report.
#
# A residual few-points gap between the two dashboards is therefore INTENTIONAL
# and STRUCTURAL, not a regression:
#   * SonarCloud measures only the crates listed in `sonar.sources` (a subset of
#     the workspace) and re-derives its own "lines to cover" denominator with the
#     Sonar analyzer.
#   * Codecov measures the whole instrumented workspace (the crates below) minus
#     the `ignore` list, using llvm-cov's line accounting.
# Different scopes + different denominators => a small, expected delta. Do NOT
# broaden `sonar.sources` to "close" the gap — that would pull unmeasured crates
# into the Sonar Quality Gate and risk failing it. The scope difference is by
# design; this comment is the record of why.
codecov:
  token: $CODECOV_TOKEN
  branch: master
  strict_yaml_branch: master

coverage:
  precision: 2
  round: down
  range: "70..100"
  status:
    patch:
      default:
        target: 70%

# Paths excluded from all coverage reports (including PR patch coverage).
# Listed binaries are run manually (not by `cargo test`), so coverage tooling
# never observes them and they would otherwise drag patch coverage to 0%.
#
# aa-ebpf/src: the userspace eBPF loader has no testable logic; the coverage
# job already `--exclude aa-ebpf` and SonarCloud drops it via sonar.exclusions
# (aa-ebpf/src/**). Mirroring it here keeps Codecov's denominator aligned with
# SonarCloud's — otherwise its ~2% coverage drags only the Codecov number down.
ignore:
  - "conformance/src/bin/"
  - "aa-proxy/src/main.rs"
  - "aa-ebpf/src/"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

flags:
  # Rust workspace — coverage generated by cargo-llvm-cov in ci.yml
  # Upload flag: --flags rust (see coverage job in ci.yml)
  # Paths mirror the crates cargo-llvm-cov actually instruments (workspace
  # library crates). aa-ebpf (coverage-excluded — Linux/nightly BPF build),
  # aa-proto (generated prost/tonic code), and conformance (test harness) are
  # deliberately omitted because they carry no measured coverage.
  rust:
    paths:
      - aa-core/src/
      - aa-auth/src/
      - aa-security/src/
      - aa-storage/src/
      - aa-storage-memory/src/
      - aa-storage-redis/src/
      - aa-cache/src/
      - aa-storage-postgres/src/
      - aa-storage-sqlite-buffer/src/
      - aa-runtime/src/
      - aa-ebpf-common/src/
      - aa-proxy/src/
      - aa-sdk-client/src/
      - aa-wasm/src/
      - aa-sandbox/src/
      - aa-gateway/src/
      - aa-api/src/
      - aa-cli/src/
      - aa-devtool-contract/src/
      - aa-devtool/src/
      - aa-devtool-claude-code/src/
      - aa-devtool-codex/src/
      - aa-devtool-copilot/src/
      - aa-devtool-saas/src/
      - aa-devtool-windsurf/src/

  # Dashboard — React + TypeScript frontend in dashboard/
  # Coverage generated by Vitest + @vitest/coverage-v8 in dashboard.yml.
  # Upload flag: --flags dashboard (see dashboard workflow coverage job).
  # Note: coverage will show 0% until unit tests are added to dashboard/src/.
  dashboard:
    paths:
      - dashboard/src/
