# Codecov and SonarCloud report the same coverage number
# ------------------------------------------------------------------------------
# Both tools consume the SAME data: the single `lcov.info` the ci.yml Coverage
# job produces from one `cargo llvm-cov` run. Codecov reads `lcov.info` directly
# (see the "Upload to Codecov" step); SonarCloud reads it via
# `sonar.rust.lcov.reportPaths=lcov.info` in `sonar-project.properties`.
#
# The `ignore` list below restricts Codecov to exactly the crates in Sonar's
# `sonar.sources`, so both tools measure the same file set and their coverage
# percentages line up (AAASM-4008). Only a sub-percent residual can remain, from
# SonarCloud re-deriving its own "lines to cover" with the Sonar analyzer vs
# llvm-cov's line accounting — an engine difference, not a scope one.
#
# Trade-off (chosen deliberately): several well-tested crates outside
# sonar.sources (aa-security, aa-auth, aa-storage*, aa-devtool*, ...) are hidden
# from Codecov's project total to achieve this parity. Their per-PR diff coverage
# is still enforced by codecov/patch. If broad Codecov visibility is preferred
# over an identical headline number, widen the `ignore` list instead.
codecov:
  token: $CODECOV_TOKEN
  branch: master
  strict_yaml_branch: master

coverage:
  precision: 2
  round: down
  range: "70..100"
  status:
    patch:
      default:
        target: 70%

# Codecov measures the SAME crate set as SonarCloud's `sonar.sources`, so the two
# dashboards report the same coverage number. Everything outside `sonar.sources`
# is excluded here (AAASM-4008 operator decision: parity over breadth):
#   * aa-ebpf/src            — userspace eBPF loader, no testable logic (the
#                              coverage job --excludes aa-ebpf; Sonar drops it via
#                              sonar.exclusions).
#   * aa-proto               — generated prost/tonic code.
#   * conformance, aa-integration-tests — test harnesses, not library code.
#   * aa-auth, aa-security, aa-storage*, aa-cache, aa-sdk-client, aa-sandbox,
#     aa-devtool*            — real, well-tested library crates, but NOT in
#                              sonar.sources; excluded so Codecov's denominator
#                              matches SonarCloud's. (Their coverage is still
#                              gated per-PR by codecov/patch on the diff.)
#   * aa-proxy/src/main.rs   — manually-run binary (never observed by tests).
ignore:
  - "aa-proxy/src/main.rs"
  - "aa-ebpf/src/"
  - "aa-proto/"
  - "conformance/"
  - "aa-integration-tests/"
  - "examples/"
  - "aa-auth/"
  - "aa-security/"
  - "aa-storage/"
  - "aa-storage-memory/"
  - "aa-storage-redis/"
  - "aa-cache/"
  - "aa-storage-postgres/"
  - "aa-storage-sqlite-buffer/"
  - "aa-sdk-client/"
  - "aa-sandbox/"
  - "aa-devtool-contract/"
  - "aa-devtool/"
  - "aa-devtool-claude-code/"
  - "aa-devtool-codex/"
  - "aa-devtool-copilot/"
  - "aa-devtool-saas/"
  - "aa-devtool-windsurf/"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

flags:
  # Rust workspace — coverage generated by cargo-llvm-cov in ci.yml
  # Upload flag: --flags rust (see coverage job in ci.yml)
  # Paths list exactly the Rust crates in SonarCloud's `sonar.sources`, so the
  # `rust` flag and the project total measure the same set Sonar does. Crates
  # outside sonar.sources are in `ignore` above and intentionally not listed.
  rust:
    paths:
      - aa-core/src/
      - aa-runtime/src/
      - aa-ebpf-common/src/
      - aa-proxy/src/
      - aa-wasm/src/
      - aa-gateway/src/
      - aa-api/src/
      - aa-cli/src/

  # Dashboard — React + TypeScript frontend in dashboard/
  # Coverage generated by Vitest + @vitest/coverage-v8 in dashboard.yml.
  # Upload flag: --flags dashboard (see dashboard workflow coverage job).
  # Note: coverage will show 0% until unit tests are added to dashboard/src/.
  dashboard:
    paths:
      - dashboard/src/
