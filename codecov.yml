# Codecov and SonarCloud report the same coverage number
# ------------------------------------------------------------------------------
# Both tools consume the SAME data: the single `lcov.info` the ci.yml Coverage
# job produces from one `cargo llvm-cov --workspace` run. Codecov reads
# `lcov.info` directly (see the "Upload to Codecov" step); SonarCloud reads it via
# `sonar.rust.lcov.reportPaths=lcov.info` in `sonar-project.properties`.
#
# Scope (AAASM-4745): both tools now measure the **tested core library crates**,
# not just the 8 originally in `sonar.sources` — `sonar.sources` was widened to
# the same set, so Codecov's project total and SonarCloud still line up (parity is
# kept, just on a broader denominator). Only a sub-percent residual can remain,
# from SonarCloud re-deriving its own "lines to cover" with the Sonar analyzer vs
# llvm-cov's line accounting — an engine difference, not a scope one.
#
# History: previously (AAASM-4008) the `ignore` list hid the library crates from
# Codecov's total to match a narrower `sonar.sources` — "parity over breadth".
# 4745 reversed that to record the core logic (aa-security/aa-auth/aa-storage/
# aa-sdk-client/…) on both dashboards.
codecov:
  token: $CODECOV_TOKEN
  branch: main
  strict_yaml_branch: main

coverage:
  precision: 2
  round: down
  range: "70..100"
  status:
    patch:
      default:
        target: 70%

# Only genuinely-untestable / non-library paths are excluded from Codecov's total.
# These mirror what `sonar-project.properties` also drops (via `sonar.sources`
# omission / `sonar.exclusions`), so the two dashboards measure the same set:
#   * aa-proxy/src/main.rs   — manually-run binary (never observed by tests).
#   * aa-ebpf/src            — userspace eBPF loader, no testable logic (the
#                              coverage job --excludes aa-ebpf; Sonar drops it via
#                              sonar.exclusions).
#   * aa-proto               — generated prost/tonic code.
#   * conformance, aa-integration-tests — test harnesses, not library code.
#   * examples/              — sample code, not shipped library logic.
ignore:
  - "aa-proxy/src/main.rs"
  - "aa-ebpf/src/"
  - "aa-proto/"
  - "conformance/"
  - "aa-integration-tests/"
  - "examples/"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

flags:
  # Rust workspace — coverage generated by cargo-llvm-cov in ci.yml
  # Upload flag: --flags rust (see coverage job in ci.yml)
  # Paths list the Rust crates in SonarCloud's `sonar.sources` (widened in
  # AAASM-4745 to include the tested core library crates), so the `rust` flag and
  # the project total measure the same set Sonar does.
  rust:
    paths:
      - aa-core/src/
      - aa-auth/src/
      - aa-security/src/
      - aa-storage/src/
      - aa-storage-memory/src/
      - aa-storage-redis/src/
      - aa-storage-postgres/src/
      - aa-storage-sqlite-buffer/src/
      - aa-cache/src/
      - aa-sdk-client/src/
      - aa-runtime/src/
      - aa-proxy/src/
      - aa-ebpf-common/src/
      - aa-sandbox/src/
      - aa-wasm/src/
      - aa-gateway/src/
      - aa-api/src/
      - aa-devtool-contract/src/
      - aa-devtool/src/
      - aa-devtool-claude-code/src/
      - aa-devtool-codex/src/
      - aa-devtool-copilot/src/
      - aa-devtool-saas/src/
      - aa-devtool-windsurf/src/
      - aa-cli/src/

  # Dashboard — React + TypeScript frontend in dashboard/
  # Coverage generated by Vitest + @vitest/coverage-v8 in dashboard.yml.
  # Upload flag: --flags dashboard (see dashboard workflow coverage job).
  # Note: coverage will show 0% until unit tests are added to dashboard/src/.
  dashboard:
    paths:
      - dashboard/src/
