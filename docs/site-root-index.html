<!DOCTYPE html>
<!--
  AAASM doc-versioning site-root redirect (AAASM-2752).
  Published at the GitHub Pages site root by the Docs workflow. Reads
  versions.json and forwards the reader to the highest-priority channel
  present: stable -> pre-release -> latest. Falls back to latest/ when
  versions.json is unavailable, so the root is never a dead end.
-->
<html lang="en">
  <head>
    <!-- Google Analytics 4 (gtag.js) + Consent Mode v2. The Measurement ID is
         public (embedded client-side), not a secret. Analytics storage is denied
         by default and only enabled after explicit opt-in. Mirrors the content-page
         tag in docs/theme/head.hbs so the bare site root is tagged too — AAASM-3559. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      // Consent Mode v2 — deny analytics/ads storage until the visitor opts in.
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
      // Re-apply a stored opt-in before the first hit fires.
      try {
        if (window.localStorage && localStorage.getItem('aa-analytics-consent') === 'granted') {
          gtag('consent', 'update', { 'analytics_storage': 'granted' });
        }
      } catch (e) {}
      gtag('js', new Date());
      gtag('config', 'G-EV2FPGTJJB', { 'anonymize_ip': true });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-EV2FPGTJJB"></script>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <title>agent-assembly documentation</title>
    <script>
      (function () {
        var fallback = "latest/";
        function go(target) {
          window.location.replace(target + window.location.hash);
        }
        fetch("versions.json", { cache: "no-cache" })
          .then(function (resp) { return resp.ok ? resp.json() : null; })
          .then(function (data) {
            var channels = (data && Array.isArray(data.channels)) ? data.channels : [];
            function targetOf(id) {
              for (var i = 0; i < channels.length; i++) {
                if (channels[i].id === id && channels[i].target) {
                  return channels[i].target + "/";
                }
              }
              return null;
            }
            // Priority chain: stable -> pre-release -> latest.
            var target = targetOf("stable") || targetOf("pre-release") || targetOf("latest");
            go(target || fallback);
          })
          .catch(function () { go(fallback); });
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=latest/">
    </noscript>
  </head>
  <body>
    <p>Redirecting to the <a href="latest/">documentation</a>&hellip;</p>
  </body>
</html>
