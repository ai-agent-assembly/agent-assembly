name: Docker

# Prerequisite: the AI-agent-assembly org must have
# Actions → Settings → Actions → Workflow permissions → "Read and write permissions" enabled.
# Without this, the GHCR publish step (on tag push) will fail with HTTP 403.

on:
  pull_request:
    branches: [master]
    paths:
      - "aa-runtime/**"
      - "docker/**"
      - ".github/workflows/docker.yml"
      - "!**/*.md"
      - "!**/LICENSE"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
      - "!**/*.ico"
  push:
    tags: ["v*"]

jobs:
  build-and-push:
    name: Build (and publish on tag)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up QEMU (ARM emulation for multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build multi-arch image (build only on PR, push on tag)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: aa-runtime/Dockerfile
          platforms: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ghcr.io/ai-agent-assembly/aa-runtime:${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
            ghcr.io/ai-agent-assembly/aa-runtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-language-images:
    name: Build language image — ${{ matrix.lang }} (and publish on tag)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Matrix covers AAASM-1204 (F114, Phase 1: latest per language) + AAASM-1441
    # (F114b, Phase 2: extended-version variants). Each entry feeds a single
    # Dockerfile from docker/ plus its language-specific smoke command. The
    # aasm-builder stage is identical across every entry, so GHA cache
    # (type=gha,mode=max) deduplicates the cargo build across the matrix.
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: python
            version: "3.14-slim"
            dockerfile: docker/Dockerfile.python-3.14-slim
            smoke_run: "python -c \"from agent_assembly import init_assembly\""
          - lang: python
            version: "3.13-slim"
            dockerfile: docker/Dockerfile.python-3.13-slim
            smoke_run: "python -c \"from agent_assembly import init_assembly\""
          - lang: python
            version: "3.12-slim"
            dockerfile: docker/Dockerfile.python-3.12-slim
            smoke_run: "python -c \"from agent_assembly import init_assembly\""
          # Python 3.10 / 3.11 are intentionally absent here — see AAASM-1682.
          # python-sdk's pyproject.toml declares `requires-python = ">=3.12,<4.0"`,
          # so pip refuses to install `agent-assembly` on these older runtimes.
          # The Dockerfiles ship in-tree (no CI cost) and the matrix entries will
          # return once AAASM-1682 lands (either by relaxing the SDK's
          # requires-python floor, or by formally dropping 3.10/3.11 from scope).
          # Node 20 / 22 / 24 are all intentionally absent here. Re-enabled
          # by AAASM-1660 (node 20) / AAASM-1661 (node 22) / AAASM-1503
          # (node 24) once AAASM-1203 publishes `@agent-assembly/sdk` to
          # npm. The transitional git/tarball install paths can't produce
          # a working image because the SDK's `dist/` and native `.node`
          # files are gitignored — see AAASM-1501 for the full
          # investigation. Three follow-up subtasks share one PR.
          - lang: go
            version: "1.26-alpine"
            dockerfile: docker/Dockerfile.go-1.26-alpine
            smoke_run: "go list -m github.com/AI-agent-assembly/go-sdk@latest"
          - lang: go
            version: "1.25-alpine"
            dockerfile: docker/Dockerfile.go-1.25-alpine
            smoke_run: "go list -m github.com/AI-agent-assembly/go-sdk@latest"
          - lang: go
            version: "1.24-alpine"
            dockerfile: docker/Dockerfile.go-1.24-alpine
            smoke_run: "go list -m github.com/AI-agent-assembly/go-sdk@latest"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up QEMU (ARM emulation for multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PR build: linux/amd64 only + load into local Docker daemon so the
      # follow-up smoke step can `docker run` the image. Tag-push build:
      # multi-arch + push to GHCR. `load` and multi-arch are mutually exclusive,
      # so the two modes are gated on the event type.
      - name: "Build ${{ matrix.lang }} image — PR loads for smoke, tag pushes to GHCR"
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ghcr.io/agent-assembly/${{ matrix.lang }}:${{ matrix.version }}
            ghcr.io/agent-assembly/${{ matrix.lang }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke run on PR builds only — the image is locally loaded, so we can
      # exercise `aasm --version` and the language-specific entrypoint before
      # the PR can merge. Tag-push smoke is covered by AAASM-1226 via
      # `docker pull` against the freshly-published GHCR tag.
      - name: Smoke run (PR only)
        if: github.event_name == 'pull_request'
        env:
          IMAGE: ghcr.io/agent-assembly/${{ matrix.lang }}:${{ matrix.version }}
          SMOKE_RUN: ${{ matrix.smoke_run }}
        run: |
          docker run --rm "$IMAGE" aasm --version
          docker run --rm "$IMAGE" sh -c "$SMOKE_RUN"
