name: Docker

permissions:
  contents: read

# Prerequisite: the ai-agent-assembly org must have
# Actions → Settings → Actions → Workflow permissions → "Read and write permissions" enabled.
# Without this, the GHCR publish step (on tag push) will fail with HTTP 403.

on:
  pull_request:
    branches: [master]
    paths:
      - "aa-runtime/**"
      - "aa-gateway/**"
      - "docker/**"
      - ".github/workflows/docker.yml"
      - "!**/*.md"
      - "!**/LICENSE"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
      - "!**/*.ico"
  push:
    tags: ["v*"]

jobs:
  # AAASM-4022: PR-validation build only — no `packages: write`. A PR-triggered
  # run must never hold registry write scope (it never pushes), so this job runs
  # with `contents: read` and `push: false`. The tag-only `publish-*` jobs below
  # carry `packages: write` and are the only paths that push to GHCR.
  build-and-push:
    name: Build (and publish on tag)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Build aa-runtime image (PR validation, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: aa-runtime/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ghcr.io/ai-agent-assembly/aa-runtime:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build aa-gateway image (PR validation, no push)
        # AAASM-4480: exercise aa-gateway/Dockerfile on every PR that touches it
        # (mirrors the aa-runtime PR build). Still no `packages: write` — this
        # PR path only builds; the tag-only `publish-gateway` job pushes.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: aa-gateway/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ghcr.io/ai-agent-assembly/aa-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-runtime:
    # AAASM-4022: tag-only publish path. `packages: write` lives here (never on
    # the PR build path) so registry write scope is only granted on a v* tag.
    name: Publish aa-runtime image (tag)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up QEMU (ARM emulation for multi-arch)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: aa-runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ai-agent-assembly/aa-runtime:${{ github.ref_name }}
            ghcr.io/ai-agent-assembly/aa-runtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prep:
    name: Resolve language matrix (full 9-image matrix on PR and tag)
    runs-on: ubuntu-latest
    outputs:
      lang_matrix: ${{ steps.set.outputs.lang_matrix }}
    steps:
      # Build the FULL 9-image matrix on BOTH pull_request and tag/push. Every
      # image (3 langs x 3 versions) is validated in CI on docker/** changes so
      # the real SDK-pinned image is exercised before merge — not just the
      # `is_latest` representative per language. Cost trade-off: 9 image builds
      # per PR instead of 3, but the shared aasm-builder stage + GHA cache
      # (type=gha,mode=max) dedup the cargo build, so the extra legs are mostly
      # the cheap language layers on top.
      - id: set
        run: |
          full='[
            {"lang":"python","version":"3.14-slim","dockerfile":"docker/Dockerfile.python-3.14-slim","smoke_run":"python -c \"from agent_assembly import init_assembly\"","is_latest":true},
            {"lang":"python","version":"3.13-slim","dockerfile":"docker/Dockerfile.python-3.13-slim","smoke_run":"python -c \"from agent_assembly import init_assembly\""},
            {"lang":"python","version":"3.12-slim","dockerfile":"docker/Dockerfile.python-3.12-slim","smoke_run":"python -c \"from agent_assembly import init_assembly\""},
            {"lang":"node","version":"24-slim","dockerfile":"docker/Dockerfile.node-24-slim","smoke_run":"node -e \"require('"'"'@agent-assembly/sdk'"'"')\"","is_latest":true},
            {"lang":"node","version":"22-slim","dockerfile":"docker/Dockerfile.node-22-slim","smoke_run":"node -e \"require('"'"'@agent-assembly/sdk'"'"')\""},
            {"lang":"node","version":"20-slim","dockerfile":"docker/Dockerfile.node-20-slim","smoke_run":"node -e \"require('"'"'@agent-assembly/sdk'"'"')\""},
            {"lang":"go","version":"1.26-alpine","dockerfile":"docker/Dockerfile.go-1.26-alpine","smoke_run":"go list -m github.com/ai-agent-assembly/go-sdk@latest","is_latest":true},
            {"lang":"go","version":"1.25-alpine","dockerfile":"docker/Dockerfile.go-1.25-alpine","smoke_run":"go list -m github.com/ai-agent-assembly/go-sdk@latest"},
            {"lang":"go","version":"1.24-alpine","dockerfile":"docker/Dockerfile.go-1.24-alpine","smoke_run":"go list -m github.com/ai-agent-assembly/go-sdk@latest"}
          ]'
          sel=$(printf '%s' "$full" | jq -c '.')
          printf 'lang_matrix={"include":%s}\n' "$sel" >> "$GITHUB_OUTPUT"

  build-and-push-language-images:
    # AAASM-4022: PR-validation build only — no `packages: write`. Builds each
    # image, loads it locally, and runs the language smoke test. Never pushes;
    # the tag-only `publish-language-images` job below holds `packages: write`.
    name: Build language image — ${{ matrix.lang }} (and publish on tag)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: prep
    permissions:
      contents: read

    # Matrix covers AAASM-1204 (F114, Phase 1: latest per language) + AAASM-1441
    # (F114b, Phase 2: extended-version variants). Each entry feeds a single
    # Dockerfile from docker/ plus its language-specific smoke command. The
    # aasm-builder stage is identical across every entry, so GHA cache
    # (type=gha,mode=max) deduplicates the cargo build across the matrix.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prep.outputs.lang_matrix) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      # Resolve the pinned SDK version for this language from the single source
      # of truth (docker/sdk-versions.json) and pass it into the build as
      # SDK_VERSION so the image installs a reproducible, pinned SDK. jq is
      # preinstalled on ubuntu-latest.
      - name: Resolve pinned SDK version for ${{ matrix.lang }}
        id: sdkver
        run: echo "version=$(jq -r --arg l "${{ matrix.lang }}" '.sdk[$l]' docker/sdk-versions.json)" >> "$GITHUB_OUTPUT"

      # PR build: linux/amd64 only + load into local Docker daemon so the
      # follow-up smoke step can `docker run` the image.
      - name: "Build ${{ matrix.lang }} image — loads locally for smoke"
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            SDK_VERSION=${{ steps.sdkver.outputs.version }}
          tags: ghcr.io/ai-agent-assembly/${{ matrix.lang }}:${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke run on PR builds — the image is locally loaded, so we can exercise
      # `aasm --version` and the language-specific entrypoint before the PR can
      # merge. Tag-push smoke is covered by AAASM-1226 via `docker pull` against
      # the freshly-published GHCR tag.
      - name: Smoke run (PR only)
        env:
          IMAGE: ghcr.io/ai-agent-assembly/${{ matrix.lang }}:${{ matrix.version }}
          SMOKE_RUN: ${{ matrix.smoke_run }}
          LANG_KEY: ${{ matrix.lang }}
          SDK_VERSION: ${{ steps.sdkver.outputs.version }}
        run: |
          docker run --rm "$IMAGE" aasm --version
          docker run --rm "$IMAGE" sh -c "$SMOKE_RUN"
          # Assert the SDK version actually baked into the image matches the pin
          # in docker/sdk-versions.json, failing the job on any drift so a stale
          # or mis-resolved SDK_VERSION can never ship.
          case "$LANG_KEY" in
            python)
              installed=$(docker run --rm "$IMAGE" python -c "import importlib.metadata as m; print(m.version('agent-assembly'))")
              ;;
            node)
              installed=$(docker run --rm "$IMAGE" npm ls -g @agent-assembly/sdk --depth=0 2>/dev/null | grep -o '@agent-assembly/sdk@[^ ]*' | cut -d@ -f3)
              ;;
            go)
              # The go image runs `go install ...@<SDK_VERSION>` at build time, so
              # a bad pin fails the build itself; there is no installed-package
              # registry to query at runtime. Echo the pin and skip the compare.
              echo "go SDK pinned at $SDK_VERSION (verified at build time)"
              installed="$SDK_VERSION"
              ;;
            *)
              echo "::error::unknown language '$LANG_KEY' in SDK version assertion" >&2
              exit 1
              ;;
          esac
          if [ "$installed" != "$SDK_VERSION" ]; then
            echo "::error::SDK version mismatch for $LANG_KEY: image has '$installed', pin is '$SDK_VERSION'" >&2
            exit 1
          fi
          echo "SDK version OK for $LANG_KEY: $installed == $SDK_VERSION"

  publish-language-images:
    # AAASM-4022: tag-only publish path for the language images. `packages: write`
    # lives here (never on the PR build path) so registry write scope is only
    # granted on a v* tag.
    name: Publish language image — ${{ matrix.lang }} (tag)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: prep
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prep.outputs.lang_matrix) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up QEMU (ARM emulation for multi-arch)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve pinned SDK version for ${{ matrix.lang }}
        id: sdkver
        run: echo "version=$(jq -r --arg l "${{ matrix.lang }}" '.sdk[$l]' docker/sdk-versions.json)" >> "$GITHUB_OUTPUT"

      # Tag-push build: multi-arch + push to GHCR.
      #   <lang>:<version>                    — moving tag, always.
      #   <lang>:<version>-<ref_name>         — immutable product-version tag
      #     (ref_name is the release tag, e.g. v0.0.1-beta.4).
      #   <lang>:latest                       — only for is_latest entries (the
      #     F114 pin per language). See AAASM-1446.
      - name: "Push ${{ matrix.lang }} image to GHCR"
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SDK_VERSION=${{ steps.sdkver.outputs.version }}
          tags: |
            ghcr.io/ai-agent-assembly/${{ matrix.lang }}:${{ matrix.version }}
            ghcr.io/ai-agent-assembly/${{ matrix.lang }}:${{ matrix.version }}-${{ github.ref_name }}
            ${{ matrix.is_latest && format('ghcr.io/ai-agent-assembly/{0}:latest', matrix.lang) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
