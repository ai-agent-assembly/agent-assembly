name: Docker

# Prerequisite: the AI-agent-assembly org must have
# Actions → Settings → Actions → Workflow permissions → "Read and write permissions" enabled.
# Without this, the GHCR publish step (on tag push) will fail with HTTP 403.

on:
  pull_request:
    branches: [master]
    paths:
      - "aa-runtime/**"
      - ".github/workflows/docker.yml"
      - "!**/*.md"
      - "!**/LICENSE"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
      - "!**/*.ico"
  push:
    tags: ["v*"]

jobs:
  build-and-push:
    name: Build (and publish on tag)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up QEMU (ARM emulation for multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build multi-arch image (build only on PR, push on tag)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: aa-runtime/Dockerfile
          platforms: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ghcr.io/ai-agent-assembly/aa-runtime:${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
            ghcr.io/ai-agent-assembly/aa-runtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
