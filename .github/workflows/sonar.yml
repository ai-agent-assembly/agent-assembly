name: SonarCloud

on:
  push:
    branches: [master]
    paths:
      - "aa-*/**"
      - "dashboard/**"
      - "sonar-project.properties"
      - ".github/workflows/sonar.yml"
      - "!**/*.md"
      - "!**/LICENSE"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
      - "!**/*.ico"
  pull_request:
    branches: [master]
    paths:
      - "aa-*/**"
      - "dashboard/**"
      - "sonar-project.properties"
      - ".github/workflows/sonar.yml"
      - "!**/*.md"
      - "!**/LICENSE"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
      - "!**/*.ico"

jobs:
  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy,llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3f7f2bd74f95d407a45d96b106f26d4f6c238fab # cargo-llvm-cov

      - name: Generate Clippy report
        # aa-ebpf build.rs invokes nightly (not installed here) — exclude it.
        # aa-ffi-python requires Python development headers for linking when
        # --all-features activates extension-module — exclude it.
        # The SonarCloud Rust plugin also re-runs clippy internally; the same
        # exclusion is applied via sonar.exclusions so aa-ebpf sources are skipped.
        run: cargo clippy --all-targets --all-features --exclude aa-ebpf --exclude aa-ffi-python --message-format=json 2>&1 | tee clippy-report.json || true

      - name: Pre-build aasm binary (AAASM-2340)
        # Compiling aa-cli uninstrumented to target/debug/ keeps llvm-cov's
        # target/llvm-cov-target/ separate. Integration tests then spawn
        # the pre-built binary via AASM_BIN_PATH, skipping the cargo-run
        # graph walk that compounds badly under llvm-cov's 2-5x slowdown
        # (dashboard_start_sigint_clean_shutdown / _then_stop_cleans_pidfile
        # timed out at 90s otherwise). aa-cli dispatch is already covered
        # by its own unit tests; the loss from running the subprocess
        # uninstrumented is negligible.
        run: |
          cargo build --quiet -p aa-cli --bin aasm
          mkdir -p "$RUNNER_TEMP/aasm-bin"
          mv target/debug/aasm "$RUNNER_TEMP/aasm-bin/aasm"
          rm -rf target/debug

      - name: Generate coverage report (LCOV for SonarCloud)
        env:
          AASM_BIN_PATH: ${{ runner.temp }}/aasm-bin/aasm
        # aa-ebpf requires nightly and has no testable userspace logic — excluded.
        # aa-ffi-python requires Python development headers for linking — excluded.
        # aa-devtool-claude-code is run separately without docker-integration:
        # the docker-integration feature triggers an 8+ minute Docker build with no
        # instrumented coverage benefit.
        # sustained_load_p99_under_5ms, all_layers_run_independently, and
        # auth_rate_limit_resets_after_window are timing-sensitive tests that
        # fail under llvm-cov instrumentation overhead — skipped in coverage
        # runs only.
        #
        # The `ebpf_*` tests in aa-integration-tests/tests/e2e_ebpf.rs are the
        # AAASM-1520 Layer 3 suite: they need nightly + bpf-linker + the
        # built BPF probes + root, none of which SonarCloud provides
        # (`--all-features` activates them but `--exclude aa-ebpf` means the
        # BPF object never gets built, so `Ebpf::load` trips on empty bytes).
        # The dedicated `e2e-ebpf-linux` job in ci.yml is authoritative.
        #
        # The `selftest_*` tests in aa-integration-tests/tests/e2e_sdk_node.rs
        # spawn `pnpm exec tsx` and require a live Node SDK dev environment.
        # pnpm/Node.js are not installed before this step (AAASM-1551).
        #
        # The `handle_shutdown_*` local_mode tests (AAASM-1728) spawn an axum
        # server + reqwest client and assert sub-500 ms shutdown timing. The
        # 2-5× overhead from llvm-cov instrumentation pushes them past that
        # bound and the test runner wedges; the regular CI Test job
        # exercises them without instrumentation.
        run: |
          cargo llvm-cov --no-report --all-features --workspace \
            --exclude aa-ebpf --exclude aa-ffi-python --exclude aa-devtool-claude-code \
            -- --skip sustained_load_p99_under_5ms --skip all_layers_run_independently \
               --skip auth_rate_limit_resets_after_window --skip ebpf_ \
               --skip selftest_ --skip handle_shutdown_
          cargo llvm-cov --no-report -p aa-devtool-claude-code
          cargo llvm-cov --no-run --lcov --output-path lcov.info


      - name: Restore TypeScript coverage from cache
        id: restore-ts-lcov
        uses: actions/cache/restore@v5
        with:
          path: dashboard/coverage/lcov.info
          key: dashboard-lcov-${{ github.sha }}

      - name: Set up pnpm (fallback — Rust-only PR, no cached coverage)
        if: steps.restore-ts-lcov.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0

      - name: Set up Node.js (fallback — Rust-only PR, no cached coverage)
        if: steps.restore-ts-lcov.outputs.cache-hit != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Generate TypeScript coverage (fallback — Rust-only PR, no cached coverage)
        if: steps.restore-ts-lcov.outputs.cache-hit != 'true'
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm generate:api
          pnpm test:coverage

      # Cache Sonar's analysis-state directory across runs. This is the
      # cache pattern recommended by SonarCloud's own docs — it stores
      # per-file analysis state so subsequent runs skip work on unchanged
      # files. Doesn't address the binary download (the action manages that
      # internally), but trims ~30s off steady-state runs.
      - name: Cache SonarCloud analysis state
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('sonar-project.properties') }}
          restore-keys: |
            ${{ runner.os }}-sonar-

      # Three-attempt retry pattern. The scanner CLI is downloaded from
      # `binaries.sonarsource.com` on every run and has been observed to
      # 403 transiently (AAASM-1406 root cause on PR #421). Attempts 1
      # and 2 use `continue-on-error: true` so a failure falls through to
      # the next attempt; attempt 3 has no escape hatch, so all-three-fail
      # surfaces as job failure.
      #
      # Native GitHub Actions retry (instead of a third-party wrapper like
      # `Wandalen/wretry.action`) keeps SONAR_TOKEN handling on first-party
      # actions only — the token never crosses an unaudited action boundary.
      - name: SonarCloud scan (attempt 1)
        id: sonar-scan-attempt-1
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait before retry (attempt 2)
        if: steps.sonar-scan-attempt-1.outcome == 'failure'
        run: |
          echo "::warning::SonarCloud scanner failed on attempt 1 (likely transient CDN flake); waiting 30s before retry."
          sleep 30

      - name: SonarCloud scan (attempt 2)
        id: sonar-scan-attempt-2
        if: steps.sonar-scan-attempt-1.outcome == 'failure'
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait before retry (attempt 3)
        if: steps.sonar-scan-attempt-1.outcome == 'failure' && steps.sonar-scan-attempt-2.outcome == 'failure'
        run: |
          echo "::warning::SonarCloud scanner failed twice; waiting 30s before final retry."
          sleep 30

      - name: SonarCloud scan (attempt 3 — final)
        if: steps.sonar-scan-attempt-1.outcome == 'failure' && steps.sonar-scan-attempt-2.outcome == 'failure'
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
