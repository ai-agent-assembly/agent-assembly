name: Docs

permissions:
  contents: read
  pages: write
  id-token: write

on:
  pull_request:
    branches: [master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'
  # Release-driven frozen-version cut (AAASM-2752). Instead of reacting to a
  # raw tag push, the frozen snapshot is cut only after the Release workflow
  # has *succeeded* for that tag. This guarantees we never publish docs for a
  # release whose binaries/crates failed to build. The triggering run's
  # head_branch is the tag name (Release fires on `push: tags`).
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    # PR + master-push always build. A workflow_run only proceeds when the
    # upstream Release succeeded AND it was a release tag (vX.Y.Z[-pre]).
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v6
        with:
          # For a release cut, build the docs from the tagged commit, not master.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache mdBook binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-mermaid
          key: ${{ runner.os }}-mdbook-0.5.2-mermaid-0.17.0

      - name: Install mdBook
        run: |
          if ! command -v mdbook >/dev/null; then
            cargo install --locked --version 0.5.2 mdbook
          fi

      - name: Install mdbook-mermaid
        run: |
          if ! command -v mdbook-mermaid >/dev/null; then
            cargo install --locked --version 0.17.0 mdbook-mermaid
          fi

      - name: Build book
        run: mdbook build docs

      # --- Doc versioning (AAASM-2752) ---
      # The Pages site is laid out as per-version subpaths under `_site/`:
      #   _site/index.html      -> root redirect (stable -> pre-release -> latest)
      #   _site/versions.json   -> manifest read by the selector + warning banner
      #   _site/latest/         -> live docs tracking master
      #   _site/<vX.Y.Z[-pre]>/ -> frozen, immutable release snapshots
      #
      # versions.json describes moving CHANNELS that point at a concrete
      # subpath, plus immutable ARCHIVED concrete versions:
      #   { "channels": [ {id,title,target}, ... ],
      #     "archived": [ {id,title}, ... ] }
      # Channels: latest (master), pre-release (newest vX.Y.Z-pre tag),
      #           stable (newest vX.Y.Z tag). Channel id classification:
      #   ^v\d+\.\d+\.\d+$    -> stable
      #   ^v\d+\.\d+\.\d+-.+  -> pre-release
      #
      # On master push we publish into latest/. On a *successful* Release
      # (workflow_run) we publish into <tag>/, archive it, and repoint the
      # stable or pre-release channel to it.
      - name: Resolve target version subpath
        if: github.event_name != 'pull_request'
        id: docver
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            tag="$RELEASE_TAG"
            # Classify the channel from the tag shape.
            if printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              channel="stable"
            elif printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              channel="pre-release"
            else
              echo "::error::Tag '$tag' is not a release version; skipping docs cut."
              exit 1
            fi
            echo "version=$tag" >> "$GITHUB_OUTPUT"
            echo "channel=$channel" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore previously published versions
        if: github.event_name != 'pull_request'
        id: restore
        continue-on-error: true
        run: |
          # Aggregate existing published versions so we never wipe old
          # version subpaths. We pull the live Pages site root; if the site
          # does not exist yet (first deploy) this is a no-op.
          base_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}"
          echo "Fetching existing versions.json from ${base_url}/versions.json"
          if curl -fsSL "${base_url}/versions.json" -o prior-versions.json; then
            echo "prior_versions=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing versions.json (first deploy)."
            echo "prior_versions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble versioned Pages site
        if: github.event_name != 'pull_request'
        env:
          VERSION: ${{ steps.docver.outputs.version }}
          CHANNEL: ${{ steps.docver.outputs.channel }}
        run: |
          set -euo pipefail
          base_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}"

          mkdir -p _site
          # 1. Mirror existing published subpaths so they survive this deploy
          #    (deploy-pages replaces the whole site with the artifact). We
          #    union the prior channel targets + archived ids.
          if [ -f prior-versions.json ]; then
            python3 - <<'PYIDS' > prior-ids.txt
          import json
          d = json.load(open("prior-versions.json"))
          ids = set()
          for c in d.get("channels", []):
              if isinstance(c, dict) and c.get("target"):
                  ids.add(c["target"])
          for a in d.get("archived", []):
              if isinstance(a, dict) and a.get("id"):
                  ids.add(a["id"])
          print(" ".join(sorted(ids)))
          PYIDS
            for v in $(cat prior-ids.txt); do
              if [ "$v" = "$VERSION" ]; then continue; fi
              echo "Restoring existing version subpath: $v"
              mkdir -p "_site/$v"
              wget -q -e robots=off -np -r -nH --cut-dirs=1 -P "_site" "${base_url}/${v}/" \
                || echo "WARN: could not mirror ${v}; it re-publishes from its own tag run."
            done
          fi

          # 2. Place the freshly built book at the target version subpath.
          rm -rf "_site/$VERSION"
          mkdir -p "_site/$VERSION"
          cp -R docs/book/. "_site/$VERSION/"

          # 3. Recompute versions.json: merge prior manifest with this cut.
          python3 - "$VERSION" "$CHANNEL" <<'PYEOF'
          import json, os, sys

          version, channel = sys.argv[1], sys.argv[2]

          channels = {}   # id -> {id,title,target}
          archived = {}   # id -> {id,title}

          def channel_title(cid, target):
              if cid == "latest":
                  return "latest (master)"
              if cid == "stable":
                  return "stable (%s)" % target
              if cid == "pre-release":
                  return "pre-release (%s)" % target
              return cid

          # Seed from the prior live manifest.
          if os.path.exists("prior-versions.json"):
              try:
                  prior = json.load(open("prior-versions.json"))
                  for c in prior.get("channels", []):
                      if isinstance(c, dict) and c.get("id") and c.get("target"):
                          channels[c["id"]] = {
                              "id": c["id"],
                              "title": c.get("title") or channel_title(c["id"], c["target"]),
                              "target": c["target"],
                          }
                  for a in prior.get("archived", []):
                      if isinstance(a, dict) and a.get("id"):
                          archived[a["id"]] = {"id": a["id"], "title": a.get("title") or a["id"]}
              except Exception:
                  pass

          # Seed the committed source manifest (ensures `latest` always exists).
          if os.path.exists("docs/versions.json"):
              try:
                  src = json.load(open("docs/versions.json"))
                  for c in src.get("channels", []):
                      if isinstance(c, dict) and c.get("id") and c.get("target"):
                          channels.setdefault(c["id"], {
                              "id": c["id"],
                              "title": c.get("title") or channel_title(c["id"], c["target"]),
                              "target": c["target"],
                          })
              except Exception:
                  pass

          # Always guarantee a latest channel.
          channels.setdefault("latest", {"id": "latest", "title": "latest (master)", "target": "latest"})

          # Apply this cut.
          if channel == "latest":
              channels["latest"] = {"id": "latest", "title": "latest (master)", "target": "latest"}
          else:
              # Repoint the moving channel to this concrete tag and archive it.
              channels[channel] = {
                  "id": channel,
                  "title": channel_title(channel, version),
                  "target": version,
              }
              archived[version] = {"id": version, "title": version}

          # Order channels: latest, pre-release, stable (priority/display order).
          channel_order = ["latest", "pre-release", "stable"]
          ordered_channels = [channels[c] for c in channel_order if c in channels]

          # Archived newest-first by semantic version (string fallback).
          def sortkey(item):
              import re
              m = re.match(r"^v(\d+)\.(\d+)\.(\d+)(?:-(.+))?$", item["id"])
              if not m:
                  return (0, 0, 0, "")
              maj, mino, pat, pre = m.groups()
              # release (no pre) sorts after its pre-releases at the same x.y.z
              return (int(maj), int(mino), int(pat), pre or "~")
          ordered_archived = sorted(archived.values(), key=sortkey, reverse=True)

          out = {"channels": ordered_channels, "archived": ordered_archived}
          json.dump(out, open("_site/versions.json", "w"), indent=2)
          print("versions.json:", json.dumps(out))
          PYEOF

          # 4. Root redirect (stable -> pre-release -> latest, resolved client-side).
          cp docs/site-root-index.html _site/index.html

          echo "Assembled _site:"; find _site -maxdepth 2 -type d | sort

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-commands:
    name: Verify documented commands (Linux)
    # Only on PR / master push; a release cut re-verifies nothing new.
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (protoc, pkg-config, libssl-dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Verify README "Getting Started" build command
        run: cargo build --workspace --exclude aa-ebpf

      - name: Verify api-reference.md rustdoc command
        run: cargo doc --workspace --no-deps --exclude aa-ebpf

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
