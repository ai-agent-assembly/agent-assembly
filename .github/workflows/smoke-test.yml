name: Smoke Test (Release Artifacts)

# Runs after a GitHub Release is published and verifies that every distribution
# channel installs and runs the published artifacts on a clean runner.
#
# Story:    AAASM-1235 (F119 — Post-release artifact smoke test)
# Sub-task: AAASM-1250 (Homebrew + curl installer jobs)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to smoke-test, without the leading 'v' (e.g. 0.0.1). Defaults to the release tag that triggered the workflow."
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: "Release version to smoke-test, without the leading 'v' (e.g. 0.0.1)."
        required: true
        type: string

permissions:
  contents: read
  issues: write
  packages: read

# Avoid concurrent smoke runs for the same release tag.
concurrency:
  group: smoke-test-${{ github.event.release.tag_name || inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  smoke-homebrew-macos:
    name: Smoke — Homebrew (macOS ARM64)
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Compute expected aasm version
        id: expected
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not resolve release version from event payload" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Expected aasm version: ${version}"

      - name: Install aasm via Homebrew tap
        run: |
          brew update
          brew install ai-agent-assembly/agent-assembly/aasm

      - name: Verify aasm --version matches release tag
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        shell: bash
        run: |
          got=$(aasm --version)
          want="aasm ${EXPECTED}"
          echo "Installed: ${got}"
          echo "Expected:  ${want}"
          [ "${got}" = "${want}" ] || {
            echo "::error::aasm --version mismatch — got '${got}', want '${want}'"
            exit 1
          }

  smoke-homebrew-linux:
    name: Smoke — Homebrew (Linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Compute expected aasm version
        id: expected
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not resolve release version from event payload" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Homebrew (Linuxbrew) on a clean Ubuntu runner
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Install aasm via Homebrew tap
        run: |
          brew update
          brew install ai-agent-assembly/agent-assembly/aasm

      - name: Verify aasm --version matches release tag
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        shell: bash
        run: |
          got=$(aasm --version)
          want="aasm ${EXPECTED}"
          echo "Installed: ${got}"
          echo "Expected:  ${want}"
          [ "${got}" = "${want}" ] || {
            echo "::error::aasm --version mismatch — got '${got}', want '${want}'"
            exit 1
          }

  smoke-curl-installer:
    name: Smoke — curl installer
    # AAASM-2339: get.agent-assembly.io is not provisioned yet (no DNS,
    # no Cloudflare Worker). The job is preserved here under an unconditional
    # `if: false` so the wiring is ready when the curl|sh install path ships;
    # until then the job is skipped on every release and emits no signal.
    # Deliberately kept out of `notify-on-failure`'s `needs:` list so a
    # skipped run does not propagate to that downstream job. To re-enable:
    # provision the endpoint, flip `if: false` to `if: true` (or drop the
    # line), and re-add `- smoke-curl-installer` to notify-on-failure's
    # `needs:`.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute expected aasm version
        id: expected
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not resolve release version from event payload" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install aasm via the curl installer
        run: |
          # Pipe-to-shell is the documented one-liner for this distribution
          # channel; the installer drops `aasm` into a directory on $PATH for
          # the current shell. Re-export common install locations so the
          # subsequent step can find the binary regardless of which one the
          # installer chose.
          curl -fsSL https://get.agent-assembly.io | sh
          {
            echo "$HOME/.local/bin"
            echo "$HOME/.agent-assembly/bin"
            echo "/usr/local/bin"
          } >> "$GITHUB_PATH"

      - name: Verify aasm --version matches release tag
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        shell: bash
        run: |
          got=$(aasm --version)
          want="aasm ${EXPECTED}"
          echo "Installed: ${got}"
          echo "Expected:  ${want}"
          [ "${got}" = "${want}" ] || {
            echo "::error::aasm --version mismatch — got '${got}', want '${want}'"
            exit 1
          }

  smoke-python-pypi-import:
    name: Smoke — Python pip (import + __version__)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute expected aasm version
        id: expected
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not resolve release version from event payload" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12 on a clean runner
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install agent-assembly from PyPI
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir 'agent-assembly'

      - name: Verify agent_assembly.__version__ matches release tag
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        shell: bash
        run: |
          got=$(python -c "import agent_assembly; print(agent_assembly.__version__)")
          want="${EXPECTED}"
          echo "Installed: ${got}"
          echo "Expected:  ${want}"
          [ "${got}" = "${want}" ] || {
            echo "::error::agent_assembly.__version__ mismatch — got '${got}', want '${want}'"
            exit 1
          }

  smoke-python-pypi-runtime:
    name: Smoke — Python pip (aasm --version via [runtime] extra)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute expected aasm version
        id: expected
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not resolve release version from event payload" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12 on a clean runner
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install agent-assembly from PyPI
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir 'agent-assembly'

      - name: Verify the bundled aasm binary prints the release tag
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        shell: bash
        run: |
          got=$(aasm --version)
          want="aasm ${EXPECTED}"
          echo "Installed: ${got}"
          echo "Expected:  ${want}"
          [ "${got}" = "${want}" ] || {
            echo "::error::aasm --version mismatch — got '${got}', want '${want}'"
            exit 1
          }

  smoke-npm:
    name: Smoke — npm (@agent-assembly/sdk install + require)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute expected aasm version
        id: expected
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not resolve release version from event payload" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js 20 LTS on a clean runner
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install @agent-assembly/sdk from the public npm registry
        run: |
          # Smoke test runs from /tmp on a fresh runner so that no
          # repo-local package.json can shadow the install.
          mkdir -p /tmp/aa-npm-smoke
          cd /tmp/aa-npm-smoke
          npm init -y >/dev/null
          npm install --no-audit --no-fund @agent-assembly/sdk

      - name: Verify the package loads via require() without throwing
        run: |
          cd /tmp/aa-npm-smoke
          node -e "require('@agent-assembly/sdk')"

      - name: Verify installed package version matches release tag
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        shell: bash
        run: |
          cd /tmp/aa-npm-smoke
          got=$(node -p "require('@agent-assembly/sdk/package.json').version")
          want="${EXPECTED}"
          echo "Installed: ${got}"
          echo "Expected:  ${want}"
          [ "${got}" = "${want}" ] || {
            echo "::error::@agent-assembly/sdk version mismatch — got '${got}', want '${want}'"
            exit 1
          }

  smoke-docker:
    name: Smoke — Docker (ghcr.io/ai-agent-assembly/python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute expected aasm version
        id: expected
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${TAG#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not resolve release version from event payload" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        # GITHUB_TOKEN gets packages:read from the workflow-level
        # permission grant; this works for both public and private
        # tags so the workflow doesn't have to change if visibility
        # ever flips.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Run aasm --version inside ghcr.io/ai-agent-assembly/python
        env:
          EXPECTED: ${{ steps.expected.outputs.version }}
        shell: bash
        run: |
          image="ghcr.io/ai-agent-assembly/python:${EXPECTED}"
          got=$(docker run --rm "${image}" aasm --version)
          want="aasm ${EXPECTED}"
          echo "Image:     ${image}"
          echo "Installed: ${got}"
          echo "Expected:  ${want}"
          [ "${got}" = "${want}" ] || {
            echo "::error::Container aasm --version mismatch for ${image} — got '${got}', want '${want}'"
            exit 1
          }

  notify-on-failure:
    name: Open Issue when a smoke job fails
    needs:
      - smoke-homebrew-macos
      - smoke-homebrew-linux
      - smoke-python-pypi-import
      - smoke-python-pypi-runtime
      - smoke-npm
      - smoke-docker
    # Fire only when the workflow is genuinely broken — `failure()` covers
    # any failed `needs:` job; the `release` event guard avoids dispatching
    # notifications during manual `workflow_dispatch` reruns.
    if: failure() && (github.event_name == 'release' || github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open an Issue with the list of failed smoke jobs
        uses: actions/github-script@v9
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        with:
          script: |
            const tag = context.payload?.release?.tag_name
              || context.payload?.release?.name
              || context.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const needs = JSON.parse(process.env.NEEDS_JSON);
            const failedLines = Object.entries(needs)
              .filter(([, j]) => j.result !== 'success' && j.result !== 'skipped')
              .map(([k, j]) => `- \`${k}\` — **${j.result}**`)
              .join('\n');
            const title = `Smoke test failed for release ${tag}`;
            const body = [
              `The post-release smoke test workflow failed for release **${tag}**.`,
              '',
              '## Failed jobs',
              failedLines || '_(no individual job result was non-success — the workflow itself failed)_',
              '',
              `Workflow run: ${runUrl}`,
              '',
              '_Opened automatically by the `Smoke Test (Release Artifacts)` workflow on failure (AAASM-1252)._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'release', 'smoke-test-failure'],
            });
