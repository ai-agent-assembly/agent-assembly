name: Dashboard CI

on:
  push:
    branches: [master]
    paths:
      - "dashboard/**"
      - "openapi/v1.yaml"
      - ".github/workflows/dashboard-ci.yml"
      - "!**/*.md"
      - "!**/LICENSE"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
      - "!**/*.ico"
  pull_request:
    branches: [master]
    paths:
      - "dashboard/**"
      - "openapi/v1.yaml"
      - ".github/workflows/dashboard-ci.yml"
      - "!**/*.md"
      - "!**/LICENSE"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.webp"
      - "!**/*.ico"

jobs:
  typecheck-and-lint:
    name: Dashboard (type-check + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate API types from OpenAPI spec
        run: pnpm generate:api
      - name: Type check
        run: pnpm type-check
      - name: Lint
        run: pnpm lint

  build:
    name: Dashboard build
    runs-on: ubuntu-latest
    needs: [typecheck-and-lint]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate API types from OpenAPI spec
        run: pnpm generate:api
      - name: Build production bundle
        run: pnpm build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 1


  test:
    name: Dashboard tests + coverage
    runs-on: ubuntu-latest
    needs: [typecheck-and-lint]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate API types from OpenAPI spec
        run: pnpm generate:api
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Cache coverage report for SonarCloud
        uses: actions/cache/save@v5
        with:
          path: dashboard/coverage/lcov.info
          key: dashboard-lcov-${{ github.sha }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: dashboard/coverage/lcov.info
          name: Dashboard (TypeScript)
          flags: dashboard
          token: ${{ secrets.CODECOV_TOKEN }}

  codegen-drift:
    name: Dashboard codegen drift check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Regenerate API types
        run: pnpm generate:api
      - name: Check generated types are up to date
        run: git diff --exit-code src/api/generated/

  aa-cli-compat:
    name: aa-cli build compat (dashboard embed)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Download dashboard dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: dashboard/dist/
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Verify aa-cli compiles with embedded assets
        run: cargo build -p aa-cli
