name: Dashboard CI

on:
  push:
    branches: [master]
    paths:
      - "dashboard/**"
      - "openapi/v1.yaml"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "dashboard/**"
      - "openapi/v1.yaml"
      - ".github/workflows/dashboard-ci.yml"

jobs:
  typecheck-and-lint:
    name: Dashboard (type-check + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: 10.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate API types from OpenAPI spec
        run: pnpm generate:api
      - name: Type check
        run: pnpm type-check
      - name: Lint
        run: pnpm lint

  codegen-drift:
    name: Dashboard codegen drift check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: 10.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Regenerate API types
        run: pnpm generate:api
      - name: Check generated types are up to date
        run: git diff --exit-code src/api/generated/
