name: Integration tests

# End-to-end integration test suite. Runs the `aa-integration-tests` crate
# on Linux + macOS so the topology HTTP roundtrip (AAASM-1066) and the CLI
# subcommand coverage (AAASM-1258, AAASM-1441 follow-up) are exercised on
# both platforms before anything depending on them ships.

on:
  push:
    branches: [master]
    paths:
      - "aa-integration-tests/**"
      - "aa-api/**"
      - "aa-gateway/**"
      - "aa-cli/**"
      - "aa-runtime/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    branches: [master]
    paths:
      - "aa-integration-tests/**"
      - "aa-api/**"
      - "aa-gateway/**"
      - "aa-cli/**"
      - "aa-runtime/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/integration-tests.yml"

jobs:
  integration-tests:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout agent-assembly
        uses: actions/checkout@v4

      - name: Checkout sibling python-sdk
        uses: actions/checkout@v4
        with:
          repository: AI-agent-assembly/python-sdk
          path: python-sdk

      - name: Install protobuf compiler (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: integration-tests-${{ matrix.os }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@83c419a40a2e48673b2c523337e57f602dfe53c9 # cargo-nextest

      - name: Run integration tests
        env:
          PYTHON_SDK_PATH: ${{ github.workspace }}/python-sdk
        run: cargo nextest run -p aa-integration-tests --test-threads=1


      - name: Upload gateway logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-gateway-logs-${{ matrix.os }}
          path: |
            target/nextest/**/*.log
            target/debug/build/aa-integration-tests-*/output
            **/*.log
          if-no-files-found: ignore
          retention-days: 7
