name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Build dashboard assets
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build aasm + aa-gateway release binaries
        # aasm is the operator CLI; aa-gateway is the core daemon that
        # `aasm gateway start` spawns. Both must ship in the release tarball
        # (AAASM-2975) so a release / Homebrew install can launch a core —
        # without aa-gateway, `aasm gateway start` fails with
        # "aa-gateway binary not found". aa-gateway is a normal host binary
        # (no eBPF / cross-target quirks), so it builds for every matrix target.
        run: cargo build --release --target ${{ matrix.target }} -p aa-cli -p aa-gateway

      - name: Install Rosetta 2 (x86_64-apple-darwin smoke test)
        if: matrix.target == 'x86_64-apple-darwin'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Smoke-test aasm binary (size + --version)
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/aasm"
          ls -lh "$BIN"
          file "$BIN"
          "$BIN" --version

      - name: Verify aa-gateway binary built (size + type)
        # aa-gateway is the daemon `aasm gateway start` spawns; it ships in the
        # same tarball (AAASM-2975). We don't execute it here (it would bind a
        # listener); a presence + Mach-O/ELF type check is enough — the archive
        # step hard-fails anyway if the binary is missing.
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/aa-gateway"
          ls -lh "$BIN"
          file "$BIN"

      - name: Codesign + notarize aasm (macOS — gated on Apple Developer creds)
        # Dormant until the operator sets the MACOS_SIGNING_ENABLED repo variable
        # AND provisions the APPLE_* secrets; without them this step is skipped and
        # the unsigned binary ships unchanged (no behaviour change). When enabled,
        # the dist binary is Developer-ID-signed with a hardened runtime and
        # notarized so macOS Gatekeeper accepts it. (Bare CLI Mach-O binaries can't
        # be stapled; Gatekeeper verifies the notarization online on first run.)
        if: ${{ runner.os == 'macOS' && vars.MACOS_SIGNING_ENABLED == 'true' }}
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/aasm"
          KEYCHAIN="$RUNNER_TEMP/notary.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          printf '%s' "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          codesign --force --options runtime --timestamp --sign "$APPLE_DEVELOPER_ID" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          ditto -c -k "$BIN" "$RUNNER_TEMP/aasm.zip"
          printf '%s' "$APPLE_NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/notary_key.p8"
          xcrun notarytool submit "$RUNNER_TEMP/aasm.zip" \
            --key "$RUNNER_TEMP/notary_key.p8" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER" \
            --wait
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary_key.p8" "$RUNNER_TEMP/aasm.zip"
          security delete-keychain "$KEYCHAIN"

      - name: Archive binaries
        shell: bash
        run: |
          # Package both binaries side-by-side so they unpack into the same
          # directory; `aasm gateway start` resolves aa-gateway next to the
          # running aasm executable (AAASM-2975).
          tar -czf "aasm-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" aasm aa-gateway

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aasm-${{ matrix.target }}
          path: aasm-${{ matrix.target }}.tar.gz
          retention-days: 1

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write  # keyless cosign signing via GitHub OIDC

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Smoke-test dashboard (Linux x86_64)
        run: |
          mkdir -p smoke-bin
          tar -xzf artifacts/aasm-x86_64-unknown-linux-gnu.tar.gz -C smoke-bin
          chmod +x smoke-bin/aasm
          smoke-bin/aasm dashboard start &
          AASM_PID=$!
          echo "Started aasm dashboard (PID $AASM_PID), waiting for server bind..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ -o /dev/null; then
              echo "Dashboard smoke test passed (responded after ${i}s)"
              kill "$AASM_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill "$AASM_PID" 2>/dev/null || true
          echo "Dashboard smoke test FAILED: server did not respond within 30s"
          exit 1

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum aasm-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SHA256SUMS with cosign (keyless)
        if: github.event_name == 'push'
        working-directory: artifacts
        env:
          COSIGN_YES: "true"
        run: |
          # Keyless signing via the workflow's GitHub OIDC token (Fulcio cert +
          # Rekor transparency log). The self-contained bundle is what
          # install-cli.sh verifies; the detached .sig/.pem are uploaded for
          # manual / tooling convenience.
          cosign sign-blob \
            --bundle SHA256SUMS.cosign.bundle \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Upload assets to GitHub Release
        if: github.event_name == 'push'
        # AAASM-3135: pin to a full commit SHA (not the mutable v3 tag) so a
        # compromised upstream tag cannot inject code into this privileged
        # release-publishing job. SHA = tag v3.0.0.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/aasm-*.tar.gz
            artifacts/SHA256SUMS
            artifacts/SHA256SUMS.cosign.bundle
            artifacts/SHA256SUMS.sig
            artifacts/SHA256SUMS.pem
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-crates:
    # Publishes the workspace to crates.io in topological order via
    # cargo-workspaces. AAASM-2340 (resolves AAASM-2094).
    #
    # Crates that publish: aa-core, aa-proto, aa-runtime, aa-ebpf-common,
    # aa-ebpf, aa-proxy, aa-sandbox, aa-gateway, aa-cli (the binary).
    # cargo-workspaces computes the topo order automatically + polls
    # crates.io between publishes for indexing latency.
    #
    # Crates excluded (publish = false in their Cargo.toml):
    #   * aa-ffi-{go,python,node}, aa-wasm — SDK FFI scaffolding; each
    #     SDK repo (python-sdk, node-sdk, go-sdk) carries its own
    #     ffi crate and ships via PyPI / npm / Go module proxy.
    #   * aa-devtool, aa-devtool-codex, aa-devtool-windsurf,
    #     aa-devtool-claude-code, aa-devtool-copilot, aa-devtool-saas
    #     — dev-tool subsystem held back from this alpha (user
    #     directive: not feature-complete). aa-cli omits the related
    #     `aasm run` / `aasm tools` subcommands accordingly; they
    #     return once the subsystem is finished in a future PR.
    #   * aa-api, conformance, aa-integration-tests, examples/* —
    #     cloud/enterprise consumers and workspace-internal tooling.
    #
    # Dashboard bundling: aa-cli embeds the dashboard SPA via include_dir!
    # reading from aa-cli/_embedded/dashboard/dist/. That path is inside
    # the crate so `cargo publish` includes it in the tarball. We pre-
    # build the dashboard with pnpm then copy it into _embedded/ before
    # publishing. Without this step, `cargo install aasm` produces a
    # binary with only a stub "dashboard not built" page.
    name: Publish workspace to crates.io
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard for crates.io bundling
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Stage dashboard/dist into aa-cli/_embedded for crates.io tarball
        run: |
          set -euo pipefail
          rm -rf aa-cli/_embedded
          mkdir -p aa-cli/_embedded/dashboard
          cp -r dashboard/dist aa-cli/_embedded/dashboard/dist
          # Verify the SPA entry-point made it
          test -f aa-cli/_embedded/dashboard/dist/index.html
          echo "✓ aa-cli/_embedded/dashboard/dist/ staged ($(find aa-cli/_embedded -type f | wc -l) files)"

      - name: Populate aa-proto _embedded/proto/ mirror via build.rs
        # AAASM-2340: aa-proto/build.rs mirrors `proto/` -> `aa-proto/_embedded/proto/`.
        # `cargo check` is the cheapest way to trigger it. Required because
        # cargo's tarball file-enumeration runs BEFORE build.rs during
        # `cargo publish`, so the mirror must already exist on disk when
        # `cargo workspaces publish` is invoked.
        run: |
          set -euo pipefail
          cargo check -p aa-proto
          test -f aa-proto/_embedded/proto/common.proto
          echo "✓ aa-proto/_embedded/proto/ staged ($(find aa-proto/_embedded -type f | wc -l) files)"

      - name: Stage aa-ebpf/_embedded/aa-ebpf-probes/ for crates.io publish
        # AAASM-2340: aa-ebpf/build.rs prefers the sibling `../aa-ebpf-probes/`
        # for compilation when present (the dev / CI flow) and never writes to
        # `_embedded/` outside of the publish-staging step here. This step
        # mirrors the probes source into `_embedded/`, rewrites its
        # `aa-ebpf-common` path-dep to the crates.io version (because the
        # sibling `aa-ebpf-common` crate is absent in the published aa-ebpf
        # tarball), and stages the manifest as `Cargo.toml.embedded` so
        # cargo's nested-package detection does not drop the subtree from
        # the tarball file enumeration.
        run: |
          set -euo pipefail
          rm -rf aa-ebpf/_embedded
          mkdir -p aa-ebpf/_embedded
          cp -r aa-ebpf-probes aa-ebpf/_embedded/aa-ebpf-probes
          # Strip any inner target/ artifacts that might have crept in
          rm -rf aa-ebpf/_embedded/aa-ebpf-probes/target
          # Rewrite the path-dep -> crates.io version
          sed -i 's|aa-ebpf-common = { path = "../aa-ebpf-common" }|aa-ebpf-common = "0.0.1-alpha.3"|' \
              aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml
          grep -q 'aa-ebpf-common = "0.0.1-alpha.3"' aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml \
              || { echo "::error::path-dep rewrite produced unexpected result"; exit 1; }
          # Stage manifest as Cargo.toml.embedded (cargo skips nested Cargo.toml subtrees)
          mv aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml \
             aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml.embedded
          echo "✓ aa-ebpf/_embedded/aa-ebpf-probes/ staged ($(find aa-ebpf/_embedded -type f | wc -l) files)"

      - name: Strip held-back surface from aa-cli for crates.io publish
        # AAASM-2340: removes the `aa-devtool*` deps and the source files
        # that consume them (`aasm run` + `aasm tools` subcommands) before
        # publishing. Operates on the working tree only — committed
        # sources keep the full surface so local development is
        # unaffected. See `.ci/strip-for-publish.sh` for what's stripped.
        run: bash .ci/strip-for-publish.sh

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --locked --version ^0.4

      - name: Publish workspace crates in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # cargo-workspaces: --from-git uses the current git tag,
          # --no-git-push avoids creating/pushing tags (we already
          # have one from the upstream tag push), --yes skips
          # confirmation prompts.
          cargo workspaces publish \
            --from-git \
            --no-git-push \
            --yes \
            --allow-dirty \
            --no-verify \
            --token "$CARGO_REGISTRY_TOKEN"

  update-homebrew-tap:
    name: Update Homebrew tap formula
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Extract per-platform sha256
        id: shas
        shell: bash
        run: |
          cd artifacts
          if [ ! -f SHA256SUMS ]; then
            sha256sum aasm-*.tar.gz > SHA256SUMS
          fi
          {
            echo "darwin_arm=$(awk '$2=="aasm-aarch64-apple-darwin.tar.gz"{print $1}' SHA256SUMS)"
            echo "darwin_intel=$(awk '$2=="aasm-x86_64-apple-darwin.tar.gz"{print $1}' SHA256SUMS)"
            echo "linux_arm=$(awk '$2=="aasm-aarch64-unknown-linux-gnu.tar.gz"{print $1}' SHA256SUMS)"
            echo "linux_intel=$(awk '$2=="aasm-x86_64-unknown-linux-gnu.tar.gz"{print $1}' SHA256SUMS)"
          } >> "$GITHUB_OUTPUT"

      - name: Extract release version from tag
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # github.ref_name is the tag (e.g. v0.0.1); strip the leading "v".
          echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-agent-assembly tap
        uses: actions/checkout@v6
        with:
          repository: ai-agent-assembly/homebrew-agent-assembly
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite Formula/aasm.rb with new version + shas
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DARWIN_ARM: ${{ steps.shas.outputs.darwin_arm }}
          DARWIN_INTEL: ${{ steps.shas.outputs.darwin_intel }}
          LINUX_ARM: ${{ steps.shas.outputs.linux_arm }}
          LINUX_INTEL: ${{ steps.shas.outputs.linux_intel }}
        run: |
          cd tap
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/aasm.rb
          sed -i "/aasm-aarch64-apple-darwin\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${DARWIN_ARM}\"|}" Formula/aasm.rb
          sed -i "/aasm-x86_64-apple-darwin\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${DARWIN_INTEL}\"|}" Formula/aasm.rb
          sed -i "/aasm-aarch64-unknown-linux-gnu\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${LINUX_ARM}\"|}" Formula/aasm.rb
          sed -i "/aasm-x86_64-unknown-linux-gnu\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${LINUX_INTEL}\"|}" Formula/aasm.rb
          git -C . diff -- Formula/aasm.rb || true

      - name: Open tap PR via peter-evans/create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: bot/aasm-${{ steps.version.outputs.version }}
          base: master
          delete-branch: true
          commit-message: "🤖 (formula): Update aasm to ${{ steps.version.outputs.version }}"
          title: "🤖 (formula): aasm ${{ steps.version.outputs.version }}"
          body: |
            Auto-update from agent-assembly release `${{ github.ref_name }}`.

            Bumps `version` and refreshes the four per-platform `sha256` values in
            `Formula/aasm.rb` from the `SHA256SUMS` published with the release.

            Source workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  update-node-sdk-ffi-pin:
    # AAASM-2883: after every tag push, open a PR on node-sdk that bumps
    # native/aa-ffi-node/Cargo.toml's `aa-sdk-client` git-SHA pin to the
    # exact commit this release was cut from. Without this, the SDK pin
    # drifts behind the published binaries (AAASM-2880 observed an 8-day
    # drift behind alpha-9) because the manual bump step on the SDK side
    # gets forgotten. The PR is opened by the bot and reviewed/merged on
    # node-sdk; this workflow only proposes it.
    name: Update node-sdk aa-ffi-node pin
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout node-sdk
        uses: actions/checkout@v6
        with:
          repository: ai-agent-assembly/node-sdk
          token: ${{ secrets.NODE_SDK_BOT_TOKEN }}
          path: sdk

      - name: Rewrite native/aa-ffi-node/Cargo.toml aa-sdk-client rev
        shell: bash
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd sdk
          # Match the literal `aa-sdk-client = { git = "...", rev = "<40-hex>"`
          # prefix and rewrite only the rev value. We don't need to know the
          # old SHA ahead of time; the regex anchors on the surrounding tokens.
          sed -i -E 's|(aa-sdk-client = \{ git = "[^"]*", rev = )"[0-9a-f]{40}"|\1"'"${NEW_SHA}"'"|' \
            native/aa-ffi-node/Cargo.toml
          grep -q "rev = \"${NEW_SHA}\"" native/aa-ffi-node/Cargo.toml \
            || { echo "::error::aa-sdk-client rev rewrite produced unexpected result"; exit 1; }
          git -C . diff -- native/aa-ffi-node/Cargo.toml || true

      - name: Regenerate native/aa-ffi-node/Cargo.lock for the new pin
        shell: bash
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd sdk
          # AAASM-2959: re-resolve the lock so it matches the just-rewritten
          # Cargo.toml rev. node pins only aa-sdk-client; its transitive
          # aa-core/aa-proto from the same git source update with it. This only
          # re-resolves the lock (no compile), so cargo alone suffices.
          cargo update --manifest-path native/aa-ffi-node/Cargo.toml \
            -p aa-sdk-client --precise "${NEW_SHA}"
          git -C . diff -- native/aa-ffi-node/Cargo.lock || true

      - name: Open SDK pin-bump PR via peter-evans/create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          path: sdk
          token: ${{ secrets.NODE_SDK_BOT_TOKEN }}
          branch: bot/aa-ffi-pin-${{ github.ref_name }}
          base: master
          delete-branch: true
          commit-message: "🤖 (aa-ffi-node): Bump aa-sdk-client pin to ${{ github.ref_name }}"
          title: "🤖 (aa-ffi-node): Bump aa-sdk-client pin to ${{ github.ref_name }}"
          body: |
            Auto-bump `aa-sdk-client` git-SHA pin in `native/aa-ffi-node/Cargo.toml`
            to track agent-assembly release `${{ github.ref_name }}` (commit
            `${{ github.sha }}`).

            Why: without this PR, the SDK source pin drifts behind the published
            agent-assembly binaries (AAASM-2880 observed an 8-day drift behind
            alpha-9). Merging this PR on `node-sdk` realigns the native shim
            with the matching upstream tag.

            Upstream tag: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            Source workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  update-python-sdk-ffi-pin:
    # AAASM-2883: after every tag push, open a PR on python-sdk that bumps
    # all three git-SHA pins (`aa-core`, `aa-proto`, `aa-sdk-client`) in
    # `native/aa-ffi-python/Cargo.toml` to the exact commit this release
    # was cut from. Per ADR 0002 / AAASM-2559 the three pins MUST share a
    # single SHA so cargo resolves one checkout of the agent-assembly
    # workspace; this job rewrites all three together. Mirrors
    # update-node-sdk-ffi-pin (and ultimately update-homebrew-tap).
    name: Update python-sdk aa-ffi-python pin
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout python-sdk
        uses: actions/checkout@v6
        with:
          repository: ai-agent-assembly/python-sdk
          token: ${{ secrets.PYTHON_SDK_BOT_TOKEN }}
          path: sdk

      - name: Rewrite native/aa-ffi-python/Cargo.toml git-SHA pins
        shell: bash
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd sdk
          # Rewrite the rev for each of the three shared crates. The host
          # casing varies (`AI-agent-assembly` vs `ai-agent-assembly`) across
          # historical edits, so the regex tolerates `[^"]*` for the URL.
          for crate in aa-core aa-proto aa-sdk-client; do
            sed -i -E "s|(${crate} = \{ git = \"[^\"]*\", rev = )\"[0-9a-f]{40}\"|\\1\"${NEW_SHA}\"|" \
              native/aa-ffi-python/Cargo.toml
          done
          # All three pins must now point at NEW_SHA (ADR 0002 / AAASM-2559).
          for crate in aa-core aa-proto aa-sdk-client; do
            grep -q "^${crate} = .*rev = \"${NEW_SHA}\"" native/aa-ffi-python/Cargo.toml \
              || { echo "::error::${crate} rev rewrite produced unexpected result"; exit 1; }
          done
          git -C . diff -- native/aa-ffi-python/Cargo.toml || true

      - name: Regenerate native/aa-ffi-python/Cargo.lock for the new pins
        shell: bash
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd sdk
          # AAASM-2959: re-resolve the lock so it matches the just-rewritten
          # Cargo.toml revs. python pins all three shared crates, so update all
          # three to NEW_SHA together. This only re-resolves the lock (no
          # compile), so cargo alone suffices.
          cargo update --manifest-path native/aa-ffi-python/Cargo.toml \
            -p aa-core -p aa-proto -p aa-sdk-client --precise "${NEW_SHA}"
          git -C . diff -- native/aa-ffi-python/Cargo.lock || true

      - name: Open SDK pin-bump PR via peter-evans/create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          path: sdk
          token: ${{ secrets.PYTHON_SDK_BOT_TOKEN }}
          branch: bot/aa-ffi-pin-${{ github.ref_name }}
          base: master
          delete-branch: true
          commit-message: "🤖 (aa-ffi-python): Bump aa-core/aa-proto/aa-sdk-client pin to ${{ github.ref_name }}"
          title: "🤖 (aa-ffi-python): Bump aa-core/aa-proto/aa-sdk-client pin to ${{ github.ref_name }}"
          body: |
            Auto-bump the three shared git-SHA pins (`aa-core`, `aa-proto`,
            `aa-sdk-client`) in `native/aa-ffi-python/Cargo.toml` to track
            agent-assembly release `${{ github.ref_name }}` (commit
            `${{ github.sha }}`).

            Per ADR 0002 / AAASM-2559 the three pins must share one SHA so
            cargo resolves a single checkout of the agent-assembly workspace.

            Why: without this PR, the SDK source pin drifts behind the
            published agent-assembly binaries (AAASM-2880 observed an 8-day
            drift behind alpha-9). Merging this PR on `python-sdk` realigns
            the native shim with the matching upstream tag.

            Upstream tag: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            Source workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  update-go-sdk-ffi-pin:
    # AAASM-3006: after every tag push, open a PR on go-sdk that bumps
    # native/aa-ffi-go/Cargo.toml's `aa-sdk-client` git-SHA pin to the
    # exact commit this release was cut from. Extends AAASM-2883's
    # node-sdk + python-sdk fan-out to go-sdk, which had been doing the
    # bump manually (AAASM-3005 closed the v0.0.1-beta.2 lag) — go-sdk
    # consumes `aa-sdk-client` through the same Cargo git-SHA pin
    # mechanism as node-sdk's aa-ffi-node and drifts the same way
    # without this automation.
    #
    # Mirrors `update-node-sdk-ffi-pin` (single-pin path) rather than
    # `update-python-sdk-ffi-pin` (three-pin path) because aa-ffi-go's
    # Cargo.toml carries only the single `aa-sdk-client` direct dep —
    # aa-core / aa-proto arrive transitively, same shape as aa-ffi-node.
    name: Update go-sdk aa-ffi-go pin
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout go-sdk
        uses: actions/checkout@v6
        with:
          repository: ai-agent-assembly/go-sdk
          token: ${{ secrets.GO_SDK_BOT_TOKEN }}
          path: sdk

      - name: Rewrite native/aa-ffi-go/Cargo.toml aa-sdk-client rev
        shell: bash
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd sdk
          # Match the literal `aa-sdk-client = { git = "...", rev = "<40-hex>"`
          # prefix and rewrite only the rev value. We don't need to know the
          # old SHA ahead of time; the regex anchors on the surrounding tokens.
          sed -i -E 's|(aa-sdk-client = \{ git = "[^"]*", rev = )"[0-9a-f]{40}"|\1"'"${NEW_SHA}"'"|' \
            native/aa-ffi-go/Cargo.toml
          grep -q "rev = \"${NEW_SHA}\"" native/aa-ffi-go/Cargo.toml \
            || { echo "::error::aa-sdk-client rev rewrite produced unexpected result"; exit 1; }
          git -C . diff -- native/aa-ffi-go/Cargo.toml || true

      - name: Regenerate native/aa-ffi-go/Cargo.lock for the new pin
        shell: bash
        env:
          NEW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd sdk
          # AAASM-2959: re-resolve the lock so it matches the just-rewritten
          # Cargo.toml rev. go-sdk pins only aa-sdk-client; its transitive
          # aa-core/aa-proto from the same git source update with it. This only
          # re-resolves the lock (no compile), so cargo alone suffices.
          cargo update --manifest-path native/aa-ffi-go/Cargo.toml \
            -p aa-sdk-client --precise "${NEW_SHA}"
          git -C . diff -- native/aa-ffi-go/Cargo.lock || true

      - name: Open SDK pin-bump PR via peter-evans/create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          path: sdk
          token: ${{ secrets.GO_SDK_BOT_TOKEN }}
          branch: bot/aa-ffi-pin-${{ github.ref_name }}
          base: master
          delete-branch: true
          commit-message: "🤖 (aa-ffi-go): Bump aa-sdk-client pin to ${{ github.ref_name }}"
          title: "🤖 (aa-ffi-go): Bump aa-sdk-client pin to ${{ github.ref_name }}"
          body: |
            Auto-bump `aa-sdk-client` git-SHA pin in `native/aa-ffi-go/Cargo.toml`
            to track agent-assembly release `${{ github.ref_name }}` (commit
            `${{ github.sha }}`).

            Why: without this PR, the SDK source pin drifts behind the published
            agent-assembly binaries (AAASM-2880 observed an 8-day drift behind
            alpha-9; AAASM-3005 closed the equivalent lag on go-sdk for
            v0.0.1-beta.2). Merging this PR on `go-sdk` realigns the native
            shim with the matching upstream tag.

            Upstream tag: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            Source workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  notify-downstream:
    # Cross-repo trigger: after agent-assembly's Release object is
    # published (binaries available on the GH Release page), fire a
    # repository_dispatch event to the downstream SDK repos so their
    # consume-the-binaries workflows know it's safe to run.
    #
    # Without this, node-sdk's release-node.yml fires on its OWN tag
    # push (in parallel with agent-assembly's release), tries to
    # `gh release download` aasm-*.tar.gz, and gets "release not found"
    # because agent-assembly hasn't finished publishing yet.
    #
    # AAASM-2336. Supersedes the retry-with-backoff workaround in
    # node-sdk's release-node.yml (AAASM-2328).
    name: Notify downstream SDK repos
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch to node-sdk
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.CROSS_REPO_DISPATCH_PAT }}
          repository: ai-agent-assembly/node-sdk
          event-type: agent-assembly-release-published
          client-payload: '{"release_tag": "${{ github.ref_name }}"}'

      - name: Dispatch to python-sdk
        # python-sdk's release-python.yml downloads `aasm-*` binaries from
        # the agent-assembly GH Release across four runners (linux x86_64,
        # linux aarch64, macos arm64, macos x86_64). Its current `gh release
        # download … 2>/dev/null` swallow ships a wheel without the bundled
        # binary on race; dispatching here is the only loud signal for that
        # race. Companion PR on python-sdk will switch its release trigger
        # from `push: tags` to `on: repository_dispatch` (tracked separately).
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.CROSS_REPO_DISPATCH_PAT }}
          repository: ai-agent-assembly/python-sdk
          event-type: agent-assembly-release-published
          client-payload: '{"release_tag": "${{ github.ref_name }}"}'

      # go-sdk intentionally NOT dispatched from this job: pure-Go
      # module, no `aasm-*` binary consumption in its release pipeline
      # (`goreleaser.yaml` is a check-only workflow; Go module proxy
      # auto-indexes from git tags directly). Add a dispatch step here
      # if that ever changes.
      #
      # NOTE: this exclusion is scoped to BINARY-PUBLISH RACE
      # COORDINATION only. go-sdk's `aa-sdk-client` Cargo git-SHA pin
      # is still kept in lockstep with each release via the dedicated
      # `update-go-sdk-ffi-pin` job above (AAASM-3006).

  release-status-aggregator:
    permissions:
      contents: write
    # AAASM-2456: after every release-time job finishes, probe every
    # downstream channel with scripts/check-release.sh and post the
    # report as a comment on the GH Release page. `if: always()` so the
    # aggregator runs even when an upstream job failed (the whole point
    # is to see which channels are red).
    name: Release status aggregator
    needs: [publish-crates, update-homebrew-tap, notify-downstream]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run check-release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: status
        run: |
          output=$(bash scripts/check-release.sh "${{ github.ref_name }}" 2>&1) || true
          {
            echo "report<<EOF_REPORT"
            printf '%s\n' "$output"
            echo "EOF_REPORT"
          } >> "$GITHUB_OUTPUT"
          printf '%s\n' "$output"
      - name: Post status comment on GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ steps.status.outputs.report }}
        run: |
          body="## Release status aggregator
          \`\`\`
          ${REPORT}
          \`\`\`
          — generated by \`scripts/check-release.sh\` (AAASM-2456)"
          gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --notes-file - <<< "$body" || true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
