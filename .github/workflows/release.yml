name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13

    steps:
      - uses: actions/checkout@v6

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Build dashboard assets
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build aasm release binary
        run: cargo build --release --target ${{ matrix.target }} -p aa-cli

      - name: Smoke-test aasm binary (size + --version)
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/aasm"
          ls -lh "$BIN"
          "$BIN" --version

      - name: Archive binary
        shell: bash
        run: |
          tar -czf "aasm-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" aasm

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aasm-${{ matrix.target }}
          path: aasm-${{ matrix.target }}.tar.gz
          retention-days: 1

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Smoke-test dashboard (Linux x86_64)
        run: |
          mkdir -p smoke-bin
          tar -xzf artifacts/aasm-x86_64-unknown-linux-gnu.tar.gz -C smoke-bin
          chmod +x smoke-bin/aasm
          smoke-bin/aasm dashboard start &
          AASM_PID=$!
          echo "Started aasm dashboard (PID $AASM_PID), waiting for server bind..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ -o /dev/null; then
              echo "Dashboard smoke test passed (responded after ${i}s)"
              kill "$AASM_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill "$AASM_PID" 2>/dev/null || true
          echo "Dashboard smoke test FAILED: server did not respond within 30s"
          exit 1

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum aasm-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload assets to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/aasm-*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish aa-cli to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p aa-cli
