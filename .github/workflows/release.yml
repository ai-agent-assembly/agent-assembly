name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Build dashboard assets
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build aasm release binary
        run: cargo build --release --target ${{ matrix.target }} -p aa-cli

      - name: Install Rosetta 2 (x86_64-apple-darwin smoke test)
        if: matrix.target == 'x86_64-apple-darwin'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Smoke-test aasm binary (size + --version)
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/aasm"
          ls -lh "$BIN"
          file "$BIN"
          "$BIN" --version

      - name: Archive binary
        shell: bash
        run: |
          tar -czf "aasm-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" aasm

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aasm-${{ matrix.target }}
          path: aasm-${{ matrix.target }}.tar.gz
          retention-days: 1

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Smoke-test dashboard (Linux x86_64)
        run: |
          mkdir -p smoke-bin
          tar -xzf artifacts/aasm-x86_64-unknown-linux-gnu.tar.gz -C smoke-bin
          chmod +x smoke-bin/aasm
          smoke-bin/aasm dashboard start &
          AASM_PID=$!
          echo "Started aasm dashboard (PID $AASM_PID), waiting for server bind..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ -o /dev/null; then
              echo "Dashboard smoke test passed (responded after ${i}s)"
              kill "$AASM_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill "$AASM_PID" 2>/dev/null || true
          echo "Dashboard smoke test FAILED: server did not respond within 30s"
          exit 1

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum aasm-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload assets to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/aasm-*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-crates:
    # Publishes the workspace to crates.io in topological order via
    # cargo-workspaces. AAASM-2340 (resolves AAASM-2094).
    #
    # Crates that publish: aa-core, aa-proto, aa-runtime, aa-ebpf-common,
    # aa-ebpf, aa-proxy, aa-sandbox, aa-gateway, aa-cli (the binary).
    # cargo-workspaces computes the topo order automatically + polls
    # crates.io between publishes for indexing latency.
    #
    # Crates excluded (publish = false in their Cargo.toml):
    #   * aa-ffi-{go,python,node}, aa-wasm — SDK FFI scaffolding; each
    #     SDK repo (python-sdk, node-sdk, go-sdk) carries its own
    #     ffi crate and ships via PyPI / npm / Go module proxy.
    #   * aa-devtool, aa-devtool-codex, aa-devtool-windsurf,
    #     aa-devtool-claude-code, aa-devtool-copilot, aa-devtool-saas
    #     — dev-tool subsystem held back from this alpha (user
    #     directive: not feature-complete). aa-cli omits the related
    #     `aasm run` / `aasm tools` subcommands accordingly; they
    #     return once the subsystem is finished in a future PR.
    #   * aa-api, conformance, aa-integration-tests, examples/* —
    #     cloud/enterprise consumers and workspace-internal tooling.
    #
    # Dashboard bundling: aa-cli embeds the dashboard SPA via include_dir!
    # reading from aa-cli/_embedded/dashboard/dist/. That path is inside
    # the crate so `cargo publish` includes it in the tarball. We pre-
    # build the dashboard with pnpm then copy it into _embedded/ before
    # publishing. Without this step, `cargo install aasm` produces a
    # binary with only a stub "dashboard not built" page.
    name: Publish workspace to crates.io
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.9.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard for crates.io bundling
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Stage dashboard/dist into aa-cli/_embedded for crates.io tarball
        run: |
          set -euo pipefail
          rm -rf aa-cli/_embedded
          mkdir -p aa-cli/_embedded/dashboard
          cp -r dashboard/dist aa-cli/_embedded/dashboard/dist
          # Verify the SPA entry-point made it
          test -f aa-cli/_embedded/dashboard/dist/index.html
          echo "✓ aa-cli/_embedded/dashboard/dist/ staged ($(find aa-cli/_embedded -type f | wc -l) files)"

      - name: Populate aa-proto _embedded/proto/ mirror via build.rs
        # AAASM-2340: aa-proto/build.rs mirrors `proto/` -> `aa-proto/_embedded/proto/`.
        # `cargo check` is the cheapest way to trigger it. Required because
        # cargo's tarball file-enumeration runs BEFORE build.rs during
        # `cargo publish`, so the mirror must already exist on disk when
        # `cargo workspaces publish` is invoked.
        run: |
          set -euo pipefail
          cargo check -p aa-proto
          test -f aa-proto/_embedded/proto/common.proto
          echo "✓ aa-proto/_embedded/proto/ staged ($(find aa-proto/_embedded -type f | wc -l) files)"

      - name: Stage aa-ebpf/_embedded/aa-ebpf-probes/ for crates.io publish
        # AAASM-2340: aa-ebpf/build.rs prefers the sibling `../aa-ebpf-probes/`
        # for compilation when present (the dev / CI flow) and never writes to
        # `_embedded/` outside of the publish-staging step here. This step
        # mirrors the probes source into `_embedded/`, rewrites its
        # `aa-ebpf-common` path-dep to the crates.io version (because the
        # sibling `aa-ebpf-common` crate is absent in the published aa-ebpf
        # tarball), and stages the manifest as `Cargo.toml.embedded` so
        # cargo's nested-package detection does not drop the subtree from
        # the tarball file enumeration.
        run: |
          set -euo pipefail
          rm -rf aa-ebpf/_embedded
          mkdir -p aa-ebpf/_embedded
          cp -r aa-ebpf-probes aa-ebpf/_embedded/aa-ebpf-probes
          # Strip any inner target/ artifacts that might have crept in
          rm -rf aa-ebpf/_embedded/aa-ebpf-probes/target
          # Rewrite the path-dep -> crates.io version
          sed -i 's|aa-ebpf-common = { path = "../aa-ebpf-common" }|aa-ebpf-common = "0.0.1-alpha.3"|' \
              aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml
          grep -q 'aa-ebpf-common = "0.0.1-alpha.3"' aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml \
              || { echo "::error::path-dep rewrite produced unexpected result"; exit 1; }
          # Stage manifest as Cargo.toml.embedded (cargo skips nested Cargo.toml subtrees)
          mv aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml \
             aa-ebpf/_embedded/aa-ebpf-probes/Cargo.toml.embedded
          echo "✓ aa-ebpf/_embedded/aa-ebpf-probes/ staged ($(find aa-ebpf/_embedded -type f | wc -l) files)"

      - name: Strip held-back surface from aa-cli for crates.io publish
        # AAASM-2340: removes the `aa-devtool*` deps and the source files
        # that consume them (`aasm run` + `aasm tools` subcommands) before
        # publishing. Operates on the working tree only — committed
        # sources keep the full surface so local development is
        # unaffected. See `.ci/strip-for-publish.sh` for what's stripped.
        run: bash .ci/strip-for-publish.sh

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --locked --version ^0.4

      - name: Publish workspace crates in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # cargo-workspaces: --from-git uses the current git tag,
          # --no-git-push avoids creating/pushing tags (we already
          # have one from the upstream tag push), --yes skips
          # confirmation prompts.
          cargo workspaces publish \
            --from-git \
            --no-git-push \
            --yes \
            --token "$CARGO_REGISTRY_TOKEN"

  update-homebrew-tap:
    name: Update Homebrew tap formula
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Extract per-platform sha256
        id: shas
        shell: bash
        run: |
          cd artifacts
          if [ ! -f SHA256SUMS ]; then
            sha256sum aasm-*.tar.gz > SHA256SUMS
          fi
          {
            echo "darwin_arm=$(awk '$2=="aasm-aarch64-apple-darwin.tar.gz"{print $1}' SHA256SUMS)"
            echo "darwin_intel=$(awk '$2=="aasm-x86_64-apple-darwin.tar.gz"{print $1}' SHA256SUMS)"
            echo "linux_arm=$(awk '$2=="aasm-aarch64-unknown-linux-gnu.tar.gz"{print $1}' SHA256SUMS)"
            echo "linux_intel=$(awk '$2=="aasm-x86_64-unknown-linux-gnu.tar.gz"{print $1}' SHA256SUMS)"
          } >> "$GITHUB_OUTPUT"

      - name: Extract release version from tag
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # github.ref_name is the tag (e.g. v0.0.1); strip the leading "v".
          echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-agent-assembly tap
        uses: actions/checkout@v6
        with:
          repository: AI-agent-assembly/homebrew-agent-assembly
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite Formula/aasm.rb with new version + shas
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DARWIN_ARM: ${{ steps.shas.outputs.darwin_arm }}
          DARWIN_INTEL: ${{ steps.shas.outputs.darwin_intel }}
          LINUX_ARM: ${{ steps.shas.outputs.linux_arm }}
          LINUX_INTEL: ${{ steps.shas.outputs.linux_intel }}
        run: |
          cd tap
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/aasm.rb
          sed -i "/aasm-aarch64-apple-darwin\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${DARWIN_ARM}\"|}" Formula/aasm.rb
          sed -i "/aasm-x86_64-apple-darwin\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${DARWIN_INTEL}\"|}" Formula/aasm.rb
          sed -i "/aasm-aarch64-unknown-linux-gnu\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${LINUX_ARM}\"|}" Formula/aasm.rb
          sed -i "/aasm-x86_64-unknown-linux-gnu\.tar\.gz/{n;s|sha256 \"[^\"]*\"|sha256 \"${LINUX_INTEL}\"|}" Formula/aasm.rb
          git -C . diff -- Formula/aasm.rb || true

      - name: Open tap PR via peter-evans/create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          branch: bot/aasm-${{ steps.version.outputs.version }}
          base: master
          delete-branch: true
          commit-message: "🤖 (formula): Update aasm to ${{ steps.version.outputs.version }}"
          title: "🤖 (formula): aasm ${{ steps.version.outputs.version }}"
          body: |
            Auto-update from agent-assembly release `${{ github.ref_name }}`.

            Bumps `version` and refreshes the four per-platform `sha256` values in
            `Formula/aasm.rb` from the `SHA256SUMS` published with the release.

            Source workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  smoke-test:
    # Run the 7-channel smoke test after the GitHub Release publishes.
    # The default `release: published` event-chain doesn't fire when
    # softprops/action-gh-release creates the Release under GITHUB_TOKEN,
    # so call smoke-test.yml directly via workflow_call instead.
    name: Smoke test published artifacts
    needs: publish
    if: github.event_name == 'push'
    uses: ./.github/workflows/smoke-test.yml
    permissions:
      contents: read
      issues: write
      packages: read
    with:
      version: ${{ github.ref_name }}

  notify-downstream:
    # Cross-repo trigger: after agent-assembly's Release object is
    # published (binaries available on the GH Release page), fire a
    # repository_dispatch event to the downstream SDK repos so their
    # consume-the-binaries workflows know it's safe to run.
    #
    # Without this, node-sdk's release-node.yml fires on its OWN tag
    # push (in parallel with agent-assembly's release), tries to
    # `gh release download` aasm-*.tar.gz, and gets "release not found"
    # because agent-assembly hasn't finished publishing yet.
    #
    # AAASM-2336. Supersedes the retry-with-backoff workaround in
    # node-sdk's release-node.yml (AAASM-2328).
    name: Notify downstream SDK repos
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch to node-sdk
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.CROSS_REPO_DISPATCH_PAT }}
          repository: ai-agent-assembly/node-sdk
          event-type: agent-assembly-release-published
          client-payload: '{"release_tag": "${{ github.ref_name }}"}'

      - name: Dispatch to python-sdk
        # python-sdk's release-python.yml downloads `aasm-*` binaries from
        # the agent-assembly GH Release across four runners (linux x86_64,
        # linux aarch64, macos arm64, macos x86_64). Its current `gh release
        # download … 2>/dev/null` swallow ships a wheel without the bundled
        # binary on race; dispatching here is the only loud signal for that
        # race. Companion PR on python-sdk will switch its release trigger
        # from `push: tags` to `on: repository_dispatch` (tracked separately).
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.CROSS_REPO_DISPATCH_PAT }}
          repository: ai-agent-assembly/python-sdk
          event-type: agent-assembly-release-published
          client-payload: '{"release_tag": "${{ github.ref_name }}"}'

      # go-sdk intentionally NOT dispatched: pure-Go module, no aasm
      # binary consumption in its release pipeline (`goreleaser.yaml`
      # is a check-only workflow; Go module proxy auto-indexes from
      # git tags directly). Add a dispatch step here if that ever
      # changes.
