# Dependabot configuration — agent-assembly
#
# Keeps three dependency ecosystems up to date automatically:
#
#   1. cargo        — Rust workspace crates (all 10 crates share one lockfile
#                     at the workspace root "/")
#   2. npm (pnpm)   — dashboard React + TypeScript frontend managed with pnpm;
#                     Dependabot uses "npm" ecosystem for pnpm projects and
#                     auto-detects pnpm via pnpm-lock.yaml in "dashboard/"
#   3. github-actions — Action SHAs pinned in .github/workflows/*.yml
#                       Dependabot will open PRs to bump the commit SHA and
#                       update the inline version comment when a new release
#                       of a pinned action is available
#
# Common settings applied to every entry:
#   target-branch   — always `master` (the repo's default integration branch)
#   commit-message  — Gitmoji ⬆ prefix to match the project commit convention
#   schedule        — daily to catch CVEs and patch releases quickly;
#                     adjust to "weekly" if PR noise becomes too high
#
# Reference:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:

  # ── Rust workspace ────────────────────────────────────────────────────────
  # Covers every crate in the Rust workspace (aa-core, aa-runtime, aa-ebpf,
  # aa-proxy, aa-ffi-go, aa-sdk-client, aa-wasm, aa-gateway, aa-api, aa-cli, …).
  # The workspace resolver means a single Cargo.lock at "/" tracks them all.
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "daily"
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "⬆"
    open-pull-requests-limit: 10

  # ── Dashboard (pnpm) ─────────────────────────────────────────────────────
  # React + TypeScript frontend scaffold located in dashboard/, managed with
  # pnpm (packageManager: pnpm@10.9.0 declared in dashboard/package.json).
  # Dependabot uses the "npm" ecosystem value for pnpm projects — it auto-
  # detects pnpm via the presence of pnpm-lock.yaml in the target directory.
  # Dependabot requires an explicit directory pointing to the folder that
  # contains package.json; it will NOT discover it from the root entry above.
  # Covers: react, react-dom, vite, typescript, @vitejs/plugin-react, @types/*.
  - package-ecosystem: "npm"
    directory: "/dashboard"
    target-branch: "master"
    schedule:
      interval: "daily"
    labels: ["dependencies", "dashboard", "pnpm"]
    commit-message:
      prefix: "⬆"
    open-pull-requests-limit: 10

  # ── GitHub Actions ────────────────────────────────────────────────────────
  # All actions in .github/workflows/ are pinned to full commit SHAs
  # (per SonarCloud rule S7637). Dependabot will open PRs to update both
  # the SHA and the inline version comment (e.g. # v4 → # v5) when a new
  # release is tagged upstream.
  # Covers: actions/checkout, dtolnay/rust-toolchain, Swatinem/rust-cache,
  #         taiki-e/install-action, codecov/codecov-action,
  #         EmbarkStudios/cargo-deny-action, SonarSource/sonarqube-scan-action.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "daily"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "⬆"
    open-pull-requests-limit: 10
