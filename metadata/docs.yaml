# Shared documentation metadata for the agent-assembly mdBook site.
#
# This file is the single source of truth for values that are NOT already
# encoded in Cargo.toml but are referenced from multiple docs pages. It is
# read by scripts/generate_docs_metadata.py, which regenerates the checked-in
# snippets under docs/src/generated/. Editing a value here and re-running the
# generator is the ONLY sanctioned way to change that value in the docs.
#
# What belongs here:
#   - Values referenced from two or more docs pages.
#   - Values that are stable-ish but occasionally change (protocol version,
#     canonical URLs, installer commands).
#
# What does NOT belong here:
#   - The workspace / runtime version — that is sourced directly from
#     Cargo.toml `[workspace.package].version` by the generator.
#   - Historical values (past release tags, changelog entries) — those must
#     stay literal so that historical accuracy is preserved.
#
# To add a new shared value:
#   1. Add the key below.
#   2. Extend scripts/generate_docs_metadata.py to emit a new snippet under
#      docs/src/generated/ using that key.
#   3. Reference the snippet from a docs page with `{{#include ...}}`.
#   4. Run `python3 scripts/generate_docs_metadata.py` and commit the result.
#   5. The docs CI drift check will then fail on any future manual edit that
#      is not backed by a metadata change.

# The wire protocol version currently supported by aa-runtime.
# See docs/src/versioning.md for the SemVer rules that govern bumps.
protocol_version: "protocol/v1"

# Shared-metadata single-owner note (ADR 0014). The URL values below (`repo_url`,
# `docs_url`, the `install_script_url*` set) are canonical org-shared metadata whose
# single owner is the `.github` registry `metadata/org-profile.yaml` (`urls.*`,
# generated to `metadata/generated/registry.json`); their *values* are decided by
# ADR 0007/0008. This docs-scoped copy MUST match the registry — it is not an
# independent source of truth. Genuinely docs-only values (e.g. `protocol_version`)
# stay owned here. Full runtime derivation from the cross-repo registry is the
# `.github` widen's job (AAASM-4914); this file is kept reconciled by value + the
# metadata-drift lint (.ci/check-metadata-drift.sh).

# Canonical GitHub repository URL used by installer instructions, edit-page
# links, and cross-references from ADRs. Owner: registry `urls`/repo entry.
repo_url: "https://github.com/ai-agent-assembly/agent-assembly"

# Canonical published docs site. Served from the `docs.agent-assembly.com`
# host per ADR-0008 (SaaS host-routing) and root README.md; the GitHub Pages
# deployment at `ai-agent-assembly.github.io/agent-assembly/` is the upstream
# mirror the CDN pulls from and MUST NOT be surfaced to readers.
docs_url: "https://docs.agent-assembly.com/"

# The one-line installer endpoint served by the official website (registry
# `urls.installer`). `agent-assembly.com/install.sh` is the SOLE canonical
# installer — AAASM-4931 retired the legacy hosted installer alternate. The
# GitHub raw URL is the fallback for users who want to fetch the script directly.
install_script_url: "https://agent-assembly.com/install.sh"
install_script_url_raw: "https://raw.githubusercontent.com/ai-agent-assembly/agent-assembly/HEAD/scripts/install-cli.sh"

# mdBook / mdbook-mermaid toolchain pins — the SoT for the docs-build tool
# versions (ADR 0013). These were duplicated by hand in .github/workflows/docs.yml
# AND CONTRIBUTING.md; scripts/propagate_versions.py now stamps both from here so
# a bump is a one-line edit + regenerate, not a two-file hunt. These pin the docs
# toolchain and are independent of the workspace/runtime version.
mdbook_version: "0.5.2"
mdbook_mermaid_version: "0.17.0"
