openapi: 3.1.0
info:
  title: Agent Assembly API
  description: |-
    REST API for the Agent Assembly governance gateway.

    This spec is auto-generated from `aa-api` route annotations via `utoipa`. CI fails if the generated spec drifts from the committed `openapi/v1.yaml`.
  contact:
    name: Agent Assembly Contributors
    url: https://github.com/AI-agent-assembly/agent-assembly
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.0.1
servers:
- url: http://localhost:7700
  description: Local development gateway
paths:
  /api/v1/agents:
    get:
      tags:
      - agents
      summary: '`GET /api/v1/agents` — list all registered agents with pagination.'
      description: Returns a paginated list of all agents currently known to the registry.
      operationId: list_agents
      parameters:
      - name: page
        in: query
        description: Page number (1-indexed). Defaults to 1.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 1
      - name: per_page
        in: query
        description: Items per page (max 100). Defaults to 50.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          maximum: 100
          minimum: 1
      responses:
        '200':
          description: Paginated list of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentResponse'
  /api/v1/agents/{id}:
    get:
      tags:
      - agents
      summary: '`GET /api/v1/agents/:id` — inspect a specific agent by ID.'
      description: Retrieve details of a specific agent by its hex-encoded UUID.
      operationId: get_agent
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent UUID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
    delete:
      tags:
      - agents
      summary: '`DELETE /api/v1/agents/:id` — deregister (kill) an agent.'
      description: Deregister and terminate the agent process.
      operationId: delete_agent
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent UUID
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Agent deregistered
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
  /api/v1/agents/{id}/budget:
    get:
      tags:
      - agents
      summary: '`GET /api/v1/agents/:id/budget` — per-scope budget rollup for an agent.'
      description: |-
        Returns rows for the agent itself, its team (if it belongs to one), the
        org / global totals, and its delegation subtree (if it has descendants).
        Each row carries `spent_usd`, `limit_usd`, `remaining_usd`, and
        `percent_used` (the latter two omitted when no limit is configured).
        Backs `aasm policy show <agent_id> --show-budget` (AAASM-1051) and the
        dashboard's budget-burn surface (AAASM-1055).
      operationId: get_agent_budget
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent UUID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Budget rollup rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetRollupResponse'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
  /api/v1/agents/{id}/capabilities:
    get:
      tags:
      - agents
      summary: '`GET /api/v1/agents/:id/capabilities` — effective permissions with provenance.'
      description: |-
        Returns the agent's merged `allow`/`deny` capability set plus the per-scope
        contribution from every policy in its cascade. Used by `aasm policy show
        <agent_id> --show-permissions` and `aasm topology lineage <agent_id>
        --show-permissions`, and by the dashboard's inherited-permissions panel.
      operationId: get_agent_capabilities
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent UUID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Effective permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectivePermissionsResponse'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
  /api/v1/agents/{id}/edges:
    get:
      tags:
      - agents
      summary: List directed edges for an agent.
      description: |-
        Returns edges ordered newest-first.  `direction` defaults to `outgoing`.
        `limit` defaults to 100 and is capped at 1000.  `before` filters to edges
        recorded before the given ISO 8601 timestamp.
      operationId: list_agent_edges
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent ID
        required: true
        schema:
          type: string
      - name: type
        in: query
        description: Filter by edge type (snake_case). Omit for all types.
        required: false
        schema:
          type:
          - string
          - 'null'
        example: messages
      - name: direction
        in: query
        description: Direction of edges relative to the agent. Defaults to `outgoing`.
        required: false
        schema:
          type:
          - string
          - 'null'
        example: outgoing
      - name: limit
        in: query
        description: Maximum number of results. Defaults to 100, capped at 1000.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        example: 100
      - name: before
        in: query
        description: Return only edges recorded before this ISO 8601 timestamp.
        required: false
        schema:
          type:
          - string
          - 'null'
        example: 2026-01-01T00:00:00Z
      responses:
        '200':
          description: Edge list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeListResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Store error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/agents/{id}/graph:
    get:
      tags:
      - agents
      summary: Return the topology subgraph reachable from an agent.
      description: |-
        Performs BFS outward from `id` up to `depth` hops (default 2, max 5).
        Returns all unique nodes reachable and the edges between them, with
        `is_cross_team` computed via a batched registry lookup.
      operationId: get_agent_graph
      parameters:
      - name: id
        in: path
        description: Hex-encoded root agent ID
        required: true
        schema:
          type: string
      - name: depth
        in: query
        description: BFS depth from the root agent. Defaults to 2, capped at 5.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        example: 2
      responses:
        '200':
          description: Subgraph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Store error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/agents/{id}/resume:
    post:
      tags:
      - agents
      summary: '`POST /api/v1/agents/:id/resume` — resume a suspended agent.'
      description: Resume an agent that was previously suspended back to Active status.
      operationId: resume_agent
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent UUID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Agent resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
  /api/v1/agents/{id}/subtree-burn:
    get:
      tags:
      - agents
      summary: '`GET /api/v1/agents/{id}/subtree-burn` — per-direct-child subtree spend time series.'
      description: |-
        Reads `BudgetTracker::agent_spend_history` for the agent itself and each
        direct descendant from `AgentRegistry::children_of`, then aligns the
        per-child series day-by-day so the response has one point per day in the
        requested window (`7d` default, `30d` opt-in). Days with no recorded
        spend appear with `spent_usd = "0"` for that child rather than being
        omitted, so the dashboard's stacked area renders without gaps.

        The agent's own spend is included as a synthetic `child_name: "(self)"`
        row whenever it has any recorded spend across the window, so the stack
        adds up to the subtree total.

        The history store is in-memory only (not persisted across restarts);
        the chart will populate progressively as agents accrue spend after
        the most recent gateway start.
      operationId: get_agent_subtree_burn
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent UUID
        required: true
        schema:
          type: string
      - name: period
        in: query
        description: 'Period string: `7d` (default) or `30d`.'
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Subtree-burn time series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtreeBurnResponse'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
  /api/v1/agents/{id}/suspend:
    post:
      tags:
      - agents
      summary: '`POST /api/v1/agents/:id/suspend` — suspend an agent.'
      description: Suspend a running agent with a reason logged for audit.
      operationId: suspend_agent
      parameters:
      - name: id
        in: path
        description: Hex-encoded agent UUID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuspendRequest'
        required: true
      responses:
        '200':
          description: Agent suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuspendResponse'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
  /api/v1/alerts:
    get:
      tags:
      - alerts
      summary: '`GET /api/v1/alerts` — list recent governance alerts.'
      description: List recent governance alerts such as budget warnings and policy violations.
      operationId: list_alerts
      parameters:
      - name: page
        in: query
        description: Page number (1-indexed). Defaults to 1.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 1
      - name: per_page
        in: query
        description: Items per page (max 100). Defaults to 50.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          maximum: 100
          minimum: 1
      responses:
        '200':
          description: Paginated list of recent alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertResponse'
  /api/v1/alerts/destinations:
    get:
      tags:
      - alert-destinations
      summary: '`GET /api/v1/alerts/destinations` — list destinations.'
      description: |-
        List configured notification destinations. The `kind` query parameter filters
        to webhook, slack, pagerduty, or opsgenie. Returns the full set when absent.
      operationId: list_destinations
      parameters:
      - name: kind
        in: query
        description: Optional kind filter (`webhook`, `slack`, `pagerduty`, `opsgenie`).
        required: false
        schema:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/DestinationKind'
      responses:
        '200':
          description: List of destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DestinationResponse'
    post:
      tags:
      - alert-destinations
      summary: '`POST /api/v1/alerts/destinations` — create a destination.'
      description: |-
        Register a new notification destination. The request `kind` discriminates the
        `config` shape and is validated server-side; an unknown kind returns 400
        `invalid_kind` and a malformed config returns 400 `invalid_config`.
      operationId: create_destination
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDestinationRequest'
        required: true
      responses:
        '201':
          description: Destination created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DestinationResponse'
        '400':
          description: Invalid kind or config
  /api/v1/alerts/destinations/{id}:
    get:
      tags:
      - alert-destinations
      summary: '`GET /api/v1/alerts/destinations/{id}` — fetch one destination.'
      description: |-
        Retrieve a single notification destination by id. Returns 404
        `destination_not_found` when the id is unknown.
      operationId: get_destination
      parameters:
      - name: id
        in: path
        description: Destination identifier
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Destination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DestinationResponse'
        '404':
          description: Destination not found
    put:
      tags:
      - alert-destinations
      summary: '`PUT /api/v1/alerts/destinations/{id}` — update a destination.'
      description: |-
        Replace name, config, or enabled state on an existing destination. Preserves
        the original `created_at`, bumps `updated_at`, and re-validates the config —
        invalid input returns 400.
      operationId: update_destination
      parameters:
      - name: id
        in: path
        description: Destination identifier
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDestinationRequest'
        required: true
      responses:
        '200':
          description: Destination updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DestinationResponse'
        '400':
          description: Invalid update payload
        '404':
          description: Destination not found
    delete:
      tags:
      - alert-destinations
      summary: '`DELETE /api/v1/alerts/destinations/{id}` — remove a destination.'
      description: |-
        Remove a destination. Returns 409 `destination_in_use` when any active alert
        rule still references this id — the rule must be removed or re-targeted
        before the destination can be deleted.
      operationId: delete_destination
      parameters:
      - name: id
        in: path
        description: Destination identifier
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Destination removed
        '404':
          description: Destination not found
        '409':
          description: Destination still referenced by a routing rule
  /api/v1/alerts/destinations/{id}/test:
    post:
      tags:
      - alert-destinations
      summary: '`POST /api/v1/alerts/destinations/{id}/test` — fire a test notification.'
      description: |-
        Send a real test notification through the destination's connector — no
        dry-run — so operators can verify the round-trip end-to-end. Returns 502
        `connector_failed` with the upstream status and body when the connector
        rejects the payload.
      operationId: test_destination
      parameters:
      - name: id
        in: path
        description: Destination identifier
        required: true
        schema:
          type: string
      requestBody:
        description: Optional severity / message overrides
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestDestinationRequest'
        required: true
      responses:
        '200':
          description: Connector accepted the test
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDestinationResponse'
        '404':
          description: Destination not found
        '502':
          description: Connector failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorFailedBody'
  /api/v1/alerts/ws:
    get:
      tags:
      - alerts-stream
      summary: |-
        `GET /api/v1/alerts/ws` — upgrade to a WebSocket and stream
        real-time alert lifecycle events.
      description: |-
        **Subprotocol**: clients MUST offer `aaasm-alerts-v1` in the
        `Sec-WebSocket-Protocol` upgrade header. Upgrades without it are
        rejected with `400` before protocol switch. The committed
        `openapi/v1.yaml` carries this as `x-ws-subprotocol:
        aaasm-alerts-v1` on the path object.
      operationId: ws_alerts_handler
      parameters:
      - name: events
        in: query
        description: |-
          Comma-separated lifecycle filter: `fire`, `resolve`, `silence`.
          All three are included when omitted.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: severity
        in: query
        description: |-
          Comma-separated severity filter: `CRITICAL`, `HIGH`, `MEDIUM`,
          `LOW`. All four are included when omitted.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: agent_id
        in: query
        description: Restrict the stream to a single hex-encoded agent id.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '101':
          description: WebSocket upgrade successful. Server streams AlertWsFrame JSON text frames.
        '200':
          description: Frame schema (delivered as WebSocket text frames, not as an HTTP response body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertWsFrame'
        '400':
          description: Bad request — missing subprotocol or invalid filter query parameter
    x-ws-subprotocol: aaasm-alerts-v1
  /api/v1/alerts/{id}:
    get:
      tags:
      - alerts
      summary: '`GET /api/v1/alerts/:id` — fetch one governance alert by ID.'
      description: |-
        Returns 404 with an RFC 7807 problem detail if the alert is unknown
        or has been evicted from the in-memory ring buffer.
      operationId: get_alert
      parameters:
      - name: id
        in: path
        description: ULID alert identifier (26 chars)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Alert detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '404':
          description: Alert not found
  /api/v1/alerts/{id}/resolve:
    post:
      tags:
      - alerts
      summary: '`POST /api/v1/alerts/:id/resolve` — mark a governance alert as resolved.'
      description: |-
        Idempotent — calling against an already-resolved alert returns the same
        record with `updated_at` unchanged. Returns 404 if the id is unknown or
        has been evicted from the ring buffer.
      operationId: resolve_alert
      parameters:
      - name: id
        in: path
        description: ULID alert identifier (26 chars)
        required: true
        schema:
          type: string
      requestBody:
        description: Optional resolution metadata
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveAlertRequest'
        required: true
      responses:
        '200':
          description: Alert resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '404':
          description: Alert not found
  /api/v1/approvals:
    get:
      tags:
      - approvals
      summary: '`GET /api/v1/approvals` — list approval requests with optional filters.'
      description: |-
        Without `status` returns pending requests only (backwards-compatible).
        With `status=PENDING|APPROVED|REJECTED` (case-insensitive) returns the
        matching slice. The `agent` filter narrows by `agent_id` exact match
        across both states.
      operationId: list_approvals
      parameters:
      - name: page
        in: query
        description: Page number (1-indexed). Same semantics as [`PaginationParams::page`].
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
      - name: per_page
        in: query
        description: Items per page. Same semantics as [`PaginationParams::per_page`].
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
      - name: status
        in: query
        description: |-
          Filter by approval status: `pending` | `approved` | `rejected`
          (case-insensitive). When absent, returns pending requests only —
          matches the pre-AAASM-1477 contract.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: agent
        in: query
        description: Filter by `agent_id` exact match.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Paginated list of approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovalResponse'
  /api/v1/approvals/{id}:
    get:
      tags:
      - approvals
      summary: '`GET /api/v1/approvals/:id` — look up a single approval by ID.'
      description: |-
        Returns the request whether it is currently pending or has been
        resolved (approved / rejected / timed-out). Resolved entries come
        from a bounded in-memory history (default cap 1000) — older entries
        may have been evicted under load.
      operationId: get_approval
      parameters:
      - name: id
        in: path
        description: Approval request identifier
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Approval found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
        '404':
          description: Approval request not found or evicted from history
  /api/v1/approvals/{id}/approve:
    post:
      tags:
      - approvals
      summary: '`POST /api/v1/approvals/:id/approve` — approve a pending action.'
      description: Approve a pending governance action, unblocking the agent.
      operationId: approve_action
      parameters:
      - name: id
        in: path
        description: Approval request identifier
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideRequest'
        required: true
      responses:
        '200':
          description: Action approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
        '404':
          description: Approval request not found
  /api/v1/approvals/{id}/reject:
    post:
      tags:
      - approvals
      summary: '`POST /api/v1/approvals/:id/reject` — reject a pending action.'
      description: Reject a pending governance action, denying the agent request.
      operationId: reject_action
      parameters:
      - name: id
        in: path
        description: Approval request identifier
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideRequest'
        required: true
      responses:
        '200':
          description: Action rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
        '404':
          description: Approval request not found
  /api/v1/audit/violations-by-lineage:
    get:
      tags:
      - audit
      summary: '`GET /api/v1/audit/violations-by-lineage` — policy violation heatmap by lineage.'
      description: |-
        Returns all agents that recorded at least one `PolicyViolation` event within
        the requested time window, together with their violation count and the top 3
        most-violated policy rules.  The optional `root` parameter scopes the result
        to a single delegation subtree.
      operationId: get_violations_by_lineage
      parameters:
      - name: root
        in: query
        description: Hex-encoded root agent ID; scopes results to that delegation subtree.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: window
        in: query
        description: 'Time window as a duration string: `24h` (default), `1h`, `7d`, `30m`.'
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Violation heatmap nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViolationsByLineageResponse'
        '400':
          description: Invalid query parameter
  /api/v1/auth/token:
    post:
      tags:
      - auth
      summary: Issue a short-lived JWT token from an authenticated API key.
      description: |-
        The caller must already be authenticated (via API key or existing JWT).
        If `scopes` is provided in the request body, it must be a subset of
        the caller's granted scopes.
      operationId: issue_token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
        required: true
      responses:
        '200':
          description: JWT issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: Requested scope exceeds caller grants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
      security:
      - bearer_auth: []
  /api/v1/capability/matrix:
    get:
      tags:
      - capability
      summary: |-
        `GET /api/v1/capability/matrix` — return the agent × resource × verb ×
        decision matrix that backs the dashboard Capability Matrix page.
      description: |-
        Optional filters:
        - `team_id` — return only the agent row whose `id` matches.
        - `tool` — return only the resource column whose `id` matches and filter
          each agent's `caps` map to that single key.
        - `effective_only=true` — exclude cells where all four verb decisions are `na`.
      operationId: get_matrix
      parameters:
      - name: team_id
        in: query
        description: Return only the agent row whose `id` matches this value.
        required: false
        schema:
          type:
          - string
          - 'null'
        example: research-bot-04
      - name: tool
        in: query
        description: |-
          Return only the resource column whose `id` matches this value, and
          filter each agent's caps map to that single resource key.
        required: false
        schema:
          type:
          - string
          - 'null'
        example: gmail
      - name: effective_only
        in: query
        description: When `true`, exclude capability cells where all four verb decisions are `na`.
        required: false
        schema:
          type:
          - boolean
          - 'null'
        example: true
      responses:
        '200':
          description: Capability matrix snapshot (filtered)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityMatrix'
  /api/v1/capability/override:
    get:
      tags:
      - capability
      summary: |-
        `GET /api/v1/capability/override` — list all active capability overrides
        recorded since the server started, optionally filtered to a single agent.
      description: |-
        The response is an array of [`OverrideRecord`] objects. Each record
        corresponds to one successful `POST /capability/override` call and carries
        the agents, resource, verb, decision, and ISO 8601 timestamp of when the
        override was applied.
      operationId: list_overrides
      parameters:
      - name: agent_id
        in: query
        description: Filter results to overrides that affect this agent id
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Active override records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OverrideRecord'
    post:
      tags:
      - capability
      summary: |-
        `POST /api/v1/capability/override` — apply a capability override across
        one or more agents. Mutating capability state is treated as a
        `Global`-scope policy update, so the caller must hold the `OrgAdmin`
        role (Admin API scope).
      description: |-
        Returns the subset of agent rows that actually changed — the dashboard
        uses this to drive an optimistic-UI rollback when an override fails.
        An unknown `agentId` rejects the request with 400 and leaves the store
        untouched; an unknown `resourceId` on an agent is silently skipped.

        When `ttlSeconds` is present the override is automatically reverted after
        that many seconds and the response status is **201 Created**. Without a
        TTL the response is **200 OK** (unchanged behaviour).
      operationId: apply_override
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityOverrideRequest'
        required: true
      responses:
        '200':
          description: Updated agent rows (no TTL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityOverrideResponse'
        '201':
          description: Updated agent rows with TTL scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityOverrideResponse'
        '400':
          description: Unknown agent id
        '403':
          description: Caller lacks the role required to mutate capability state
  /api/v1/capability/override/{id}:
    delete:
      tags:
      - capability
      summary: |-
        `DELETE /api/v1/capability/override/{id}` — revert a previously applied
        capability override, restoring each affected cell to its pre-override value.
      description: |-
        Returns 204 No Content on success.  Returns 404 when no active override
        with the supplied `id` exists (either it was never created or has already
        been revoked).
      operationId: revoke_override
      parameters:
      - name: id
        in: path
        description: UUID of the override to revoke
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Override revoked; cells restored to base policy
        '404':
          description: No active override with this id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/costs:
    get:
      tags:
      - costs
      summary: '`GET /api/v1/costs` — cost and budget summary.'
      description: |-
        Retrieve the current daily and monthly cost and budget summary,
        including per-agent breakdown and configured budget limits.
      operationId: get_cost_summary
      responses:
        '200':
          description: Cost and budget summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostSummary'
  /api/v1/health:
    get:
      tags:
      - health
      summary: '`GET /api/v1/health` — liveness and readiness probe.'
      description: |-
        Returns `200` when all subsystems report healthy; `503` when any subsystem
        is degraded. The `checks` map in the response body carries per-subsystem
        status strings (`"ok"` or `"degraded"`).
      operationId: health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '503':
          description: One or more subsystems are degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/iam/api-keys:
    get:
      tags:
      - iam
      summary: '`GET /api/v1/iam/api-keys` — list every API key the IAM store knows.'
      description: |-
        Returned in newest-first order. Active and revoked keys are both
        included; the dashboard filters by status in its tabs.
      operationId: list_api_keys
      responses:
        '200':
          description: All API keys, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
    post:
      tags:
      - iam
      summary: '`POST /api/v1/iam/api-keys` — issue a new API key.'
      description: |-
        IAM mutations are gated as a `Global`-scope policy update — the caller
        must hold the `OrgAdmin` role.

        The response `secret` field is shown to the caller **once**; the server
        does not persist it.
      operationId: generate_api_key
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateApiKeyRequest'
        required: true
      responses:
        '200':
          description: Generated key (with one-shot secret)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedApiKeyResponse'
        '403':
          description: Caller lacks the role required to mutate IAM state
  /api/v1/iam/api-keys/{id}/revoke:
    post:
      tags:
      - iam
      summary: '`POST /api/v1/iam/api-keys/{id}/revoke` — revoke an existing key.'
      description: 404 if the key is unknown, 409 if it is already revoked.
      operationId: revoke_api_key
      parameters:
      - name: id
        in: path
        description: API key id
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Key revoked
        '403':
          description: Caller lacks the role required to mutate IAM state
        '404':
          description: Unknown api key id
        '409':
          description: Key is already revoked
  /api/v1/iam/api-keys/{id}/rotate:
    post:
      tags:
      - iam
      summary: |-
        `POST /api/v1/iam/api-keys/{id}/rotate` — atomically revoke `id` and
        issue a replacement carrying the same label, scopes, and owner.
      description: |-
        Returns the new key's one-shot reveal. 404 if `id` is unknown, 409 if
        the source key is already revoked.
      operationId: rotate_api_key
      parameters:
      - name: id
        in: path
        description: API key id to rotate
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Replacement key with one-shot secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedApiKeyResponse'
        '403':
          description: Caller lacks the role required to mutate IAM state
        '404':
          description: Unknown api key id
        '409':
          description: Source key is already revoked
  /api/v1/logs:
    get:
      tags:
      - logs
      summary: '`GET /api/v1/logs` — paginated audit log query.'
      description: |-
        Query the paginated audit log of governance events.
        Supports optional filtering by agent ID and event type.
      operationId: list_logs
      parameters:
      - name: page
        in: query
        description: Page number (1-indexed). Defaults to 1.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 1
      - name: per_page
        in: query
        description: Items per page (max 100). Defaults to 50.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          maximum: 100
          minimum: 1
      - name: agent_id
        in: query
        description: Filter by hex-encoded agent ID.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: event_type
        in: query
        description: Filter by event type name (e.g. `PolicyViolation`).
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LogEntry'
  /api/v1/ops:
    get:
      tags:
      - ops
      summary: '`GET /api/v1/ops` — list all registered in-flight operations.'
      description: |-
        Returns a snapshot of every op currently tracked in the registry,
        regardless of lifecycle state (running, paused, or terminated).
      operationId: list_ops
      responses:
        '200':
          description: List of all registered ops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OpRecord'
    post:
      tags:
      - ops
      summary: '`POST /api/v1/ops` — register a new in-flight operation in the `running` state.'
      description: |-
        Returns `201 Created` with the initial [`OpRecord`]. Callers may then drive
        lifecycle transitions via the `pause`, `resume`, and `terminate` endpoints.
      operationId: register_op
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterOpRequest'
        required: true
      responses:
        '201':
          description: Op registered in running state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpRecord'
        '400':
          description: Empty or missing op_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/ops/{id}/pause:
    post:
      tags:
      - ops
      summary: '`POST /api/v1/ops/{id}/pause` — transition a running operation to paused.'
      description: |-
        * `200 OK` — op transitioned `running → paused`.
        * `400 Bad Request` — whitespace-only op id.
        * `404 Not Found` — no op with this id is registered.
        * `409 Conflict` — op is already paused or terminated.
      operationId: pause_op
      parameters:
      - name: id
        in: path
        description: Operation id (string form of `GovernanceEvent.id`).
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Op paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpActionAck'
        '400':
          description: Empty or malformed operation id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Op not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/ops/{id}/resume:
    post:
      tags:
      - ops
      summary: '`POST /api/v1/ops/{id}/resume` — transition a paused operation back to running.'
      description: |-
        * `200 OK` — op transitioned `paused → running`.
        * `400 Bad Request` — whitespace-only op id.
        * `404 Not Found` — no op with this id is registered.
        * `409 Conflict` — op is running or terminated.
      operationId: resume_op
      parameters:
      - name: id
        in: path
        description: Operation id (string form of `GovernanceEvent.id`).
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Op resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpActionAck'
        '400':
          description: Empty or malformed operation id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Op not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/ops/{id}/terminate:
    post:
      tags:
      - ops
      summary: '`POST /api/v1/ops/{id}/terminate` — terminate a running or paused operation.'
      description: |-
        Idempotent: a second call on an already-terminated op also returns `200 OK`.

        * `200 OK` — op transitioned to `terminated` (or was already terminated).
        * `400 Bad Request` — whitespace-only op id.
        * `404 Not Found` — no op with this id is registered.
      operationId: terminate_op
      parameters:
      - name: id
        in: path
        description: Operation id (string form of `GovernanceEvent.id`).
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Op terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpActionAck'
        '400':
          description: Empty or malformed operation id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Op not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/policies:
    get:
      tags:
      - policies
      summary: '`GET /api/v1/policies` — list all policy versions.'
      description: |-
        List governance policy versions with optional archive inclusion.
        By default only the active (most recent) version is returned.
      operationId: list_policies
      parameters:
      - name: page
        in: query
        description: Page number (1-indexed). Defaults to 1.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 1
      - name: per_page
        in: query
        description: Items per page (max 100). Defaults to 50.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          maximum: 100
          minimum: 1
      - name: include_archived
        in: query
        description: |-
          When `true`, include older (inactive) policy versions in the response.
          Defaults to `false` — only the currently active policy version is returned.
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Paginated list of policy versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyResponse'
    post:
      tags:
      - policies
      summary: '`POST /api/v1/policies` — apply a new governance policy.'
      description: |-
        Submit and activate a new governance policy from YAML.
        The caller must hold the role required for the target `scope`
        (default: `global`, requires `OrgAdmin`).
      operationId: create_policy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
        required: true
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyResponse'
        '400':
          description: Invalid policy YAML or scope
        '403':
          description: Insufficient role for this policy scope
  /api/v1/policies/active:
    get:
      tags:
      - policies
      summary: '`GET /api/v1/policies/active` — get the currently active policy.'
      description: Retrieve the currently active governance policy.
      operationId: get_active_policy
      responses:
        '200':
          description: Currently active policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyResponse'
        '404':
          description: No active policy loaded
  /api/v1/topology/edges:
    post:
      tags:
      - topology
      summary: Record a new directed topology edge.
      description: |-
        Used by SDK emitters (Python, Node.js, Go) to push observed
        agent-to-agent interactions into the gateway edge store.
      operationId: report_edge
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportEdgeRequest'
        required: true
      responses:
        '201':
          description: Edge recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportEdgeResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Store error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /api/v1/topology/lineage/{agent_id}:
    get:
      tags:
      - topology
      summary: '`GET /api/v1/topology/lineage/{agent_id}` — ancestor chain from root down to agent.'
      description: |-
        Returns the ordered ancestry for the given agent, starting from the root
        (depth 0) and ending with the requested agent as the last element.
        A root agent returns a list of length 1 containing only itself.
        Returns 404 if the agent is unknown.
      operationId: get_lineage
      parameters:
      - name: agent_id
        in: path
        description: Hex-encoded UUID of the agent
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Agent lineage chain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentLineage'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
  /api/v1/topology/overview:
    get:
      tags:
      - topology
      summary: '`GET /api/v1/topology/overview` — summary of all teams and root agents.'
      description: |-
        Returns a count of teams, root agents, and total agents across the registry,
        with a per-team breakdown and a list of standalone root agents not assigned
        to any team. Supports optional filtering by status, minimum depth, and
        governance level visibility.
      operationId: get_overview
      parameters:
      - name: status
        in: query
        description: 'Filter by agent status: `active`, `suspended`, or `deregistered`.'
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: min_depth
        in: query
        description: Only include agents at or above this delegation depth.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
      - name: show_budget
        in: query
        description: When `true`, include the governance level in each agent node.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      responses:
        '200':
          description: Topology overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopologyOverview'
  /api/v1/topology/stats:
    get:
      tags:
      - topology
      summary: '`GET /api/v1/topology/stats` — aggregate topology statistics.'
      description: |-
        Returns aggregate counts and histograms across the entire registry.
        Includes depth distribution, team-size distribution, child-count distribution,
        orphan count, and average children per parent. Never returns 404.
      operationId: get_stats
      responses:
        '200':
          description: Topology statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopologyStats'
  /api/v1/topology/team/{team_id}:
    get:
      tags:
      - topology
      summary: '`GET /api/v1/topology/team/{team_id}` — all agents in a team with depth info.'
      description: |-
        Returns all agents belonging to the given team, sorted by delegation depth.
        Results can be filtered by status and minimum depth. Returns 404 if the
        team identifier is not known to the registry.
      operationId: get_team
      parameters:
      - name: team_id
        in: path
        description: Team identifier
        required: true
        schema:
          type: string
      - name: status
        in: query
        description: 'Filter by agent status: `active`, `suspended`, or `deregistered`.'
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: min_depth
        in: query
        description: Only include agents at or above this delegation depth.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
      - name: show_budget
        in: query
        description: When `true`, include the governance level in each agent node.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      responses:
        '200':
          description: Team topology
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamTopology'
        '404':
          description: Team not found
  /api/v1/topology/tree/{root_id}:
    get:
      tags:
      - topology
      summary: '`GET /api/v1/topology/tree/{root_id}` — full subtree from a given root agent.'
      description: |-
        Recursively walks the delegation tree starting from the given agent, up to
        a configurable depth (default 10, maximum 10). Nodes can be filtered by
        status. Returns a nested JSON tree with each agent's children inline.
        Returns 422 if the agent exists but is not a root (depth > 0).
      operationId: get_tree
      parameters:
      - name: root_id
        in: path
        description: Hex-encoded UUID of the starting agent
        required: true
        schema:
          type: string
      - name: depth
        in: query
        description: Maximum traversal depth from the root (default 10, capped at 10).
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
      - name: status
        in: query
        description: 'Filter tree nodes by status: `active`, `suspended`, or `deregistered`.'
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: show_budget
        in: query
        description: When `true`, include the governance level in each tree node.
        required: false
        schema:
          type:
          - boolean
          - 'null'
      responses:
        '200':
          description: Agent subtree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTree'
        '400':
          description: Invalid agent ID format
        '404':
          description: Agent not found
        '422':
          description: Agent is not a root agent
  /api/v1/traces/{session_id}:
    get:
      tags:
      - traces
      summary: '`GET /api/v1/traces/:session_id` — full trace for one agent session.'
      description: Retrieve the full ordered trace of spans for one agent session.
      operationId: get_trace
      parameters:
      - name: session_id
        in: path
        description: Agent session identifier
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Session trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceResponse'
        '404':
          description: Session not found
  /api/v1/ws/events:
    get:
      tags:
      - events
      summary: '`GET /api/v1/ws/events` — upgrade to WebSocket and stream events.'
      description: |-
        Initiates a WebSocket connection for real-time governance event streaming.

        ## Protocol

        1. Client sends an HTTP GET with `Upgrade: websocket` headers.
        2. Server responds with `101 Switching Protocols` and upgrades the connection.
        3. Server sends `GovernanceEvent` JSON objects as text frames.
        4. Server sends periodic ping frames (every 30s); client must respond with pong.
        5. Either side may close the connection with a close frame.

        ## Replay

        The server maintains a circular buffer of the last 1000 events. Pass the
        `since` query parameter with a previously received event `id` to replay
        all buffered events after that id before switching to live streaming.

        ## Event Types

        Filter events using the `types` query parameter (comma-separated):
        - `violation` — audit / pipeline events (policy violations)
        - `approval` — human-in-the-loop approval requests
        - `budget` — budget threshold alerts

        All types are streamed when the parameter is omitted.
      operationId: ws_events_handler
      parameters:
      - name: types
        in: query
        description: |-
          Comma-separated event type filter (e.g. `violation,budget`).
          All types are included when omitted.
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: agent_id
        in: query
        description: Filter events by agent identifier (hex-encoded).
        required: false
        schema:
          type:
          - string
          - 'null'
      - name: since
        in: query
        description: |-
          Replay buffered events whose id is greater than this value.
          The server keeps the last 1000 events in a circular buffer.
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
      responses:
        '101':
          description: WebSocket upgrade successful. Server streams GovernanceEvent JSON text frames.
        '200':
          description: Event message schema (delivered as WebSocket text frames, not as an HTTP response body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceEvent'
        '400':
          description: Bad request (invalid query parameters)
components:
  schemas:
    ActiveSessionResponse:
      type: object
      description: Summary of an active session in the API response.
      required:
      - session_id
      - started_at
      - status
      properties:
        session_id:
          type: string
          description: Hex-encoded session UUID.
        started_at:
          type: string
          description: ISO 8601 timestamp when the session started.
        status:
          type: string
          description: Current status of the session.
    AgentCostEntry:
      type: object
      description: Per-agent cost entry within the budget summary.
      required:
      - agent_id
      - daily_spend_usd
      - date
      properties:
        agent_id:
          type: string
          description: Agent identifier (hex-encoded).
        daily_spend_usd:
          type: string
          description: Daily spend for this agent in USD.
        date:
          type: string
          description: Calendar date (YYYY-MM-DD) the daily spend applies to.
        monthly_spend_usd:
          type:
          - string
          - 'null'
          description: Total spend this month in USD for this agent (if monthly tracking is enabled).
    AgentLineage:
      type: object
      description: |-
        An agent's complete ancestry chain ordered root-first.

        The first element is the root agent; the last element is the requested
        agent itself. A root agent returns a list of length 1 containing only itself.

        # Example JSON
        ```json
        {
          "agent_id": "aabbccdd00112233aabbccdd00112233",
          "ancestor_count": 2,
          "ancestors": [
            { "id": "root000000000000root000000000000", "name": "root", "depth": 0, "delegation_reason": null, "team_id": null },
            { "id": "aabbccdd00112233aabbccdd00112233", "name": "child", "depth": 1, "delegation_reason": "orchestrate", "team_id": "team-alpha" }
          ]
        }
        ```
      required:
      - agent_id
      - ancestor_count
      - ancestors
      properties:
        agent_id:
          type: string
          description: The subject agent's hex-encoded UUID.
        ancestor_count:
          type: integer
          description: Number of entries in `ancestors` (includes the agent itself).
          minimum: 0
        ancestors:
          type: array
          items:
            $ref: '#/components/schemas/LineageStep'
          description: 'Ordered ancestry: index 0 is the root agent, last element is the requested agent.'
      example:
        agent_id: aabbccdd00112233aabbccdd00112233
        ancestor_count: 2
        ancestors:
        - delegation_reason: null
          depth: 0
          id: root000000000000root000000000000
          name: root
          team_id: null
        - delegation_reason: orchestrate
          depth: 1
          id: aabbccdd00112233aabbccdd00112233
          name: child
          team_id: team-alpha
    AgentMode:
      type: string
      description: Enforcement mode for an agent's capability policy.
      enum:
      - enforce
      - shadow
    AgentNode:
      type: object
      description: |-
        Minimal agent representation used in list and tree responses.

        # Example JSON
        ```json
        {
          "id": "0102030405060708090a0b0c0d0e0f10",
          "name": "my-agent",
          "depth": 1,
          "status": "active",
          "team_id": "team-alpha"
        }
        ```
      required:
      - id
      - name
      - depth
      - status
      properties:
        depth:
          type: integer
          format: int32
          description: Delegation depth — 0 for root agents.
          minimum: 0
        governance_level:
          type:
          - string
          - 'null'
          description: Governance level — included only when `show_budget=true`.
        id:
          type: string
          description: Hex-encoded agent UUID.
        name:
          type: string
          description: Human-readable agent name.
        status:
          type: string
          description: 'Runtime status: `active`, `suspended`, or `deregistered`.'
        team_id:
          type:
          - string
          - 'null'
          description: Team this agent belongs to, if any.
      example:
        depth: 1
        id: 0102030405060708090a0b0c0d0e0f10
        name: my-agent
        status: active
        team_id: team-alpha
    AgentResponse:
      type: object
      description: JSON representation of an agent returned by the API.
      required:
      - id
      - name
      - framework
      - version
      - status
      - tool_names
      - metadata
      - session_count
      - policy_violations_count
      - active_sessions
      - recent_events
      - recent_traces
      properties:
        active_sessions:
          type: array
          items:
            $ref: '#/components/schemas/ActiveSessionResponse'
          description: Currently active sessions for this agent.
        framework:
          type: string
          description: Agent framework (e.g. "langgraph", "crewai").
        id:
          type: string
          description: Hex-encoded agent UUID.
        last_event:
          type:
          - string
          - 'null'
          description: ISO 8601 timestamp of the most recent event.
        layer:
          type:
          - string
          - 'null'
          description: Governance layer this agent is assigned to (e.g. "advisory", "enforced").
        metadata:
          type: object
          description: Arbitrary metadata key-value pairs.
          additionalProperties:
            type: string
          propertyNames:
            type: string
        name:
          type: string
          description: Human-readable agent name.
        pid:
          type:
          - integer
          - 'null'
          format: int32
          description: OS process ID, if known.
          minimum: 0
        policy_violations_count:
          type: integer
          format: int32
          description: Number of policy violations recorded.
          minimum: 0
        recent_events:
          type: array
          items:
            $ref: '#/components/schemas/RecentEventResponse'
          description: Most recent events emitted by this agent.
        recent_traces:
          type: array
          items:
            $ref: '#/components/schemas/RecentTraceResponse'
          description: Most recent trace session IDs for this agent.
        session_count:
          type: integer
          format: int32
          description: Number of sessions handled.
          minimum: 0
        status:
          type: string
          description: Current runtime status.
        tool_names:
          type: array
          items:
            type: string
          description: Tools declared at registration.
        version:
          type: string
          description: Semver version string.
    AgentStatus:
      type: string
      description: Liveness status surfaced to the matrix view.
      enum:
      - active
      - idle
      - suspended
    AgentTree:
      type: object
      description: |-
        Recursive tree node representing an agent and all its descendants.

        # Example JSON
        ```json
        {
          "id": "0102030405060708090a0b0c0d0e0f10",
          "name": "root-agent",
          "depth": 0,
          "status": "active",
          "team_id": "team-alpha",
          "delegation_reason": null,
          "spawned_by_tool": null,
          "children": []
        }
        ```
      required:
      - id
      - name
      - depth
      - status
      - children
      properties:
        children:
          type: array
          items:
            $ref: '#/components/schemas/AgentTree'
        delegation_reason:
          type:
          - string
          - 'null'
          description: Reason this agent was delegated from its parent, if recorded.
        depth:
          type: integer
          format: int32
          description: Delegation depth — 0 for root agents.
          minimum: 0
        governance_level:
          type:
          - string
          - 'null'
          description: Governance level — included only when `show_budget=true`.
        id:
          type: string
          description: Hex-encoded agent UUID.
        name:
          type: string
          description: Human-readable agent name.
        spawned_by_tool:
          type:
          - string
          - 'null'
          description: Tool that spawned this agent, if known.
        status:
          type: string
          description: 'Runtime status: `active`, `suspended`, or `deregistered`.'
        team_id:
          type:
          - string
          - 'null'
          description: Team this agent belongs to, if any.
      example:
        children: []
        delegation_reason: null
        depth: 0
        id: 0102030405060708090a0b0c0d0e0f10
        name: root-agent
        spawned_by_tool: null
        status: active
        team_id: team-alpha
    AlertResponse:
      type: object
      description: JSON representation of a governance alert.
      required:
      - id
      - severity
      - category
      - message
      - timestamp
      - status
      properties:
        agent_id:
          type:
          - string
          - 'null'
          description: Agent ID that triggered the alert (if applicable).
        category:
          type: string
          description: Alert category (e.g. "budget", "secret_detected").
        detected_pattern_type:
          type:
          - string
          - 'null'
          description: |-
            Primary detected credential kind for `secret_detected` alerts
            (e.g. `"AwsAccessKey"`). Omitted for budget alerts.
        id:
          type: string
          description: Unique alert identifier.
        message:
          type: string
          description: Human-readable alert message.
        redacted_value:
          type:
          - string
          - 'null'
          description: |-
            `[REDACTED:<Kind>]` label for `secret_detected` alerts — never
            contains the raw secret. Omitted for budget alerts.
        severity:
          type: string
          description: Alert severity level (e.g. "warning", "critical").
        status:
          type: string
          description: |-
            Lifecycle status — `"unresolved"` on capture, `"resolved"` once
            the alert has been acknowledged via `POST /alerts/:id/resolve`.
        team_id:
          type:
          - string
          - 'null'
          description: |-
            Team attribution propagated from the originating request
            context. Omitted when no team was associated.
        timestamp:
          type: string
          description: ISO 8601 timestamp when the alert was raised.
        updated_at:
          type:
          - string
          - 'null'
          description: |-
            ISO 8601 timestamp of the last mutation (e.g. resolve). `None`
            while the alert is still in its initial captured state.
    AlertWsFrame:
      oneOf:
      - type: object
        description: A new alert was just captured into the store.
        required:
        - ts
        - alert
        - type
        properties:
          alert:
            $ref: '#/components/schemas/AlertResponse'
            description: Full alert payload — same shape as `GET /api/v1/alerts/{id}`.
          ts:
            type: string
            description: ISO 8601 timestamp at which the server emitted this frame.
          type:
            type: string
            enum:
            - alert.fire
      - type: object
        description: |-
          An existing alert was acknowledged via the resolve endpoint.
          `alert.status` is `"resolved"`.
        required:
        - ts
        - alert
        - type
        properties:
          alert:
            $ref: '#/components/schemas/AlertResponse'
          ts:
            type: string
          type:
            type: string
            enum:
            - alert.resolve
      - type: object
        description: |-
          An existing alert was suppressed by an active silence. Reserved
          for the future suppression feature — no production code emits
          this variant today; the schema is published so clients can
          already round-trip frames once a producer exists.
        required:
        - ts
        - alert
        - silence
        - type
        properties:
          alert:
            $ref: '#/components/schemas/AlertResponse'
          silence:
            description: |-
              Silence metadata — left as a free-form object so the
              concrete `Silence` schema can land in a follow-up without
              breaking the WS contract.
          ts:
            type: string
          type:
            type: string
            enum:
            - alert.silence
      - type: object
        description: |-
          Keep-alive frame emitted every 30 s when no other frame was
          sent in that window (AC).
        required:
        - ts
        - type
        properties:
          ts:
            type: string
          type:
            type: string
            enum:
            - heartbeat
      description: |-
        Lifecycle frame pushed to clients over the alerts WebSocket.

        Server-only — `AlertResponse` does not currently derive
        `Deserialize`, so this enum is `Serialize`-only. Client-side
        parsing happens through `serde_json::Value` in tests.
    ApiKeyResponse:
      type: object
      required:
      - id
      - label
      - prefix
      - scopes
      - status
      - created_at
      - owner
      - role
      - assigned_policies
      - recent_activity
      properties:
        assigned_policies:
          type: array
          items:
            type: string
        created_at:
          type: string
        id:
          type: string
        label:
          type: string
        last_used:
          type:
          - string
          - 'null'
        owner:
          type: string
        prefix:
          type: string
        recent_activity:
          type: array
          items:
            $ref: '#/components/schemas/RecentActivityResponse'
        role:
          type: string
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyScopeResponse'
        status:
          $ref: '#/components/schemas/ApiKeyStatusResponse'
    ApiKeyScopeResponse:
      type: string
      description: Scopes a key may hold. Wire form matches the dashboard's TS union.
      enum:
      - read:members
      - write:members
      - read:policies
      - write:policies
      - read:audit
      - admin
    ApiKeyStatusResponse:
      type: string
      enum:
      - active
      - revoked
    ApprovalPayload:
      type: object
      description: |-
        Payload for `event_type: "approval"` events.

        Represents either a freshly-submitted human-in-the-loop approval
        request or a status-change notification (e.g. auto-expiration). The
        `status` field discriminates: `"pending"` for new requests,
        `"expired"` for auto-expirations (AAASM-1453).
      required:
      - request_id
      - action
      - condition_triggered
      - submitted_at
      - timeout_secs
      - expires_at
      properties:
        action:
          type: string
          description: Human-readable description of the action awaiting approval.
        condition_triggered:
          type: string
          description: Policy condition that triggered this request.
        expires_at:
          type: integer
          format: int64
          description: |-
            Unix epoch timestamp (seconds) at which the request expires
            (`submitted_at + timeout_secs`). Provided as a pre-computed
            absolute timestamp so dashboard consumers can render the
            auto-expire countdown without local-clock drift.
          minimum: 0
        request_id:
          type: string
          description: Unique ID for the approval request (UUID v4).
        status:
          type: string
          description: |-
            Lifecycle status — `"pending"` for newly-submitted requests
            (the original event semantics) or `"expired"` when the
            per-request timeout has elapsed without a human decision
            (AAASM-1453). Defaults to `"pending"` for legacy producers
            pre-AAASM-1453 that haven't been updated.
        submitted_at:
          type: integer
          format: int64
          description: Unix epoch timestamp (seconds) when the request was submitted.
          minimum: 0
        timeout_secs:
          type: integer
          format: int64
          description: Seconds before the request times out.
          minimum: 0
    ApprovalResponse:
      type: object
      description: JSON representation of a pending approval request.
      required:
      - id
      - agent_id
      - action
      - reason
      - status
      - created_at
      - expires_at
      properties:
        action:
          type: string
          description: The governance action requiring approval.
        agent_id:
          type: string
          description: Agent that triggered the approval.
        created_at:
          type: string
          description: ISO 8601 timestamp when the request was created.
        expires_at:
          type: string
          description: |-
            ISO 8601 timestamp at which the pending request expires
            (`created_at` + the governing `approval_timeout_secs`). The
            dashboard renders a countdown from this value. Empty string on
            post-decision (`approved` / `rejected`) responses where
            expiration is no longer meaningful.
        id:
          type: string
          description: Unique approval request identifier.
        reason:
          type: string
          description: Human-readable reason for the approval request.
        routing_status:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/RoutingStatusInfo'
            description: Structured routing metadata. Absent until the router has processed the request.
        status:
          type: string
          description: 'Current status: "pending", "approved", or "rejected".'
        team_id:
          type:
          - string
          - 'null'
          description: Team the approval was routed to, if known.
    BudgetAlertPayload:
      type: object
      description: |-
        Payload for `event_type: "budget"` events.

        Emitted when an agent's spend crosses a configured daily threshold
        (80 % or 95 % of the daily limit).
      required:
      - threshold_pct
      - spent_usd
      - limit_usd
      properties:
        limit_usd:
          type: number
          format: double
          description: Configured daily limit in USD.
        spent_usd:
          type: number
          format: double
          description: Current total spend in USD at the time of the alert.
        threshold_pct:
          type: integer
          format: int32
          description: Threshold percentage that was crossed (e.g. `80` or `95`).
          minimum: 0
    BudgetRollupResponse:
      type: object
      description: Aggregated budget rollup for an agent across its scope hierarchy.
      required:
      - rows
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/BudgetRowResponse'
          description: Rows ordered narrowest scope first (agent → team → org → subtree).
    BudgetRowResponse:
      type: object
      description: One budget row in the rollup — agent / team / org / subtree × daily / monthly.
      required:
      - scope
      - period
      - spent_usd
      properties:
        limit_usd:
          type:
          - string
          - 'null'
          description: Configured limit for the period, if any (string-encoded Decimal).
        percent_used:
          type:
          - number
          - 'null'
          format: double
          description: Spend / limit × 100. Omitted when no limit.
        period:
          type: string
          description: 'Period the row covers: `"daily"`, `"monthly"`, or `"today"` (subtree).'
        remaining_usd:
          type:
          - string
          - 'null'
          description: '`limit_usd - spent_usd`, clamped at zero. Omitted when no limit.'
        scope:
          type: string
          description: 'Scope label: `"agent"`, `"team:<id>"`, `"org"`, or `"subtree"`.'
        spent_usd:
          type: string
          description: Total USD spent in the period (string-encoded Decimal).
    CallStackNode:
      type: object
      description: |-
        One node in the hierarchical call stack rendered beneath an
        expanded Live Ops row in the dashboard.

        Mirrors the proto `assembly.audit.v1.CallStackNode` message and the
        dashboard `LiveOperation.callStack[]` TS type.
      required:
      - id
      - kind
      - label
      properties:
        children:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/CallStackNode'
          description: |-
            Recursive descent — nested calls produced by this step. Omitted
            when the node has no children.
        id:
          type: string
          description: Stable identifier for this node within the call stack.
        kind:
          type: string
          description: |-
            Node category — one of `"llm"`, `"tool"`, or `"result"`. String-typed
            (not an enum) to keep this open-ended for downstream renderers.
        label:
          type: string
          description: Human-readable label rendered in the dashboard.
        latency_ms:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Step-local latency in milliseconds. Omitted when the producer did
            not record a duration for this node.
    CapCell:
      type: object
      description: |-
        One cell in the (agent × resource) matrix: a decision per verb, plus an
        optional `flag` marker the UI uses to highlight over-permissioned cells.
      required:
      - read
      - write
      - delete
      - exec
      properties:
        delete:
          $ref: '#/components/schemas/Decision'
        exec:
          $ref: '#/components/schemas/Decision'
        flag:
          type:
          - boolean
          - 'null'
          description: Marks this cell for UI attention (e.g. over-permissioned).
        read:
          $ref: '#/components/schemas/Decision'
        write:
          $ref: '#/components/schemas/Decision'
    CapabilityAgent:
      type: object
      description: One agent row in the dashboard Capability Matrix.
      required:
      - id
      - name
      - framework
      - owner
      - trust
      - mode
      - status
      - lastSeen
      - caps
      properties:
        caps:
          type: object
          description: Resource-id → CapCell mapping for this agent.
          additionalProperties:
            $ref: '#/components/schemas/CapCell'
          propertyNames:
            type: string
        flagged:
          type:
          - boolean
          - 'null'
        framework:
          type: string
        id:
          type: string
        lastSeen:
          type: string
          description: Human-readable relative-time string (e.g. `"2m ago"`).
        mode:
          $ref: '#/components/schemas/AgentMode'
        name:
          type: string
        note:
          type:
          - string
          - 'null'
        owner:
          type: string
        status:
          $ref: '#/components/schemas/AgentStatus'
        trust:
          type: integer
          format: int32
          description: Trust score on a 0–100 scale.
          minimum: 0
    CapabilityMatrix:
      type: object
      description: |-
        Top-level response shape for `GET /api/v1/capability/matrix`. Mirrors
        the `CapabilityMatrix` interface in `dashboard/src/api/capability.ts`.
      required:
      - resources
      - agents
      - policies
      - sampleCalls
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityAgent'
        policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        sampleCalls:
          type: array
          items:
            $ref: '#/components/schemas/SampleCall'
    CapabilityOverrideRequest:
      type: object
      description: |-
        Request payload for `POST /api/v1/capability/override` — apply a single
        (resource, verb, decision) override across one or more agents.
      required:
      - agentIds
      - resourceId
      - verb
      - decision
      properties:
        agentIds:
          type: array
          items:
            type: string
          description: Agents to apply the override to.
        decision:
          $ref: '#/components/schemas/Decision'
          description: New decision to record for that (resource, verb) pair.
        resourceId:
          type: string
          description: Identifier of the resource whose cell is being overridden.
        ttlSeconds:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Optional TTL in seconds. When set, the override is automatically
            reverted to the pre-override value after this duration elapses.
            The endpoint returns 201 Created instead of 200 OK when TTL is provided.
          minimum: 0
        verb:
          $ref: '#/components/schemas/Verb'
          description: Verb (read / write / delete / exec) within the cell.
    CapabilityOverrideResponse:
      type: object
      description: |-
        Response envelope for `POST /api/v1/capability/override`: the stable UUID
        assigned to this override (use it to `DELETE /capability/override/{id}`)
        plus the subset of agent rows that actually changed.
      required:
      - overrideId
      - updated
      properties:
        overrideId:
          type: string
          description: Stable UUID for this override; pass to `DELETE /capability/override/{id}` to revert.
        updated:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityAgent'
    ChangeType:
      type: string
      description: Classifier for what a proposed-vs-current decision change represents.
      enum:
      - newly-blocked
      - narrowed
      - unchanged
      - tightened
      - false-positive
    ChildSpendResponse:
      type: object
      description: Per-direct-child contribution to a single day's subtree spend.
      required:
      - child_agent_id
      - child_name
      - spent_usd
      properties:
        child_agent_id:
          type: string
          description: Hex-encoded child agent ID.
        child_name:
          type: string
          description: Display name of the child agent.
        spent_usd:
          type: string
          description: USD spent by this child on the given date (string-encoded Decimal).
    ConnectorFailedBody:
      type: object
      description: Response body for a failed test-fire (502).
      required:
      - error
      - connector_status
      - connector_body
      properties:
        connector_body:
          type: string
          description: |-
            Up-to-2048-byte snippet of the connector response body (or transport
            error description if no HTTP response was reached).
        connector_status:
          type: integer
          format: int32
          description: HTTP status the connector observed, or `0` if no response was received.
          minimum: 0
        error:
          type: string
          description: Always `"connector_failed"`.
    CostSummary:
      type: object
      description: JSON representation of the cost/budget summary.
      required:
      - daily_spend_usd
      - date
      properties:
        daily_limit_usd:
          type:
          - string
          - 'null'
          description: Configured daily budget limit in USD, if set.
        daily_spend_usd:
          type: string
          description: Total spend today in USD.
        date:
          type: string
          description: Calendar date (YYYY-MM-DD) the daily spend applies to.
        monthly_limit_usd:
          type:
          - string
          - 'null'
          description: Configured monthly budget limit in USD, if set.
        monthly_spend_usd:
          type:
          - string
          - 'null'
          description: Total spend this month in USD (if monthly tracking is enabled).
        per_agent:
          type: array
          items:
            $ref: '#/components/schemas/AgentCostEntry'
          description: Per-agent cost breakdown for the current day.
        per_team:
          type: array
          items:
            $ref: '#/components/schemas/TeamCostEntry'
          description: Per-team cost rollup for the current day.
    CreateDestinationRequest:
      allOf:
      - $ref: '#/components/schemas/DestinationConfig'
        description: Discriminated per-kind configuration.
      - type: object
        required:
        - name
        properties:
          enabled:
            type: boolean
            description: Whether dispatch is enabled on creation (defaults to true).
          name:
            type: string
            description: Operator-supplied display name.
      description: Body for `POST /api/v1/alerts/destinations`.
    CreatePolicyRequest:
      type: object
      description: Request body for creating a new policy.
      required:
      - policy_yaml
      properties:
        policy_yaml:
          type: string
          description: Raw YAML content of the governance policy.
        scope:
          type:
          - string
          - 'null'
          description: |-
            Governance scope this policy targets (e.g. `"global"`, `"team:platform"`).

            Used for RBAC authorization — the caller must hold the role required
            to mutate policies at this scope. Defaults to `"global"` when absent.
    DailyBurnPointResponse:
      type: object
      description: One point in the subtree-burn time series.
      required:
      - date
      - per_child
      - total_usd
      properties:
        date:
          type: string
          description: ISO 8601 calendar date (YYYY-MM-DD) the point covers.
        per_child:
          type: array
          items:
            $ref: '#/components/schemas/ChildSpendResponse'
          description: Per-direct-child contributions, ordered by child agent ID for stability.
        total_usd:
          type: string
          description: Total subtree spend for the date (root + descendants, string-encoded Decimal).
    DecideRequest:
      type: object
      description: Request body for approval decide actions.
      properties:
        by:
          type:
          - string
          - 'null'
          description: Identity of the operator making the decision.
        reason:
          type:
          - string
          - 'null'
          description: Optional reason for the decision.
    Decision:
      type: string
      description: Decision recorded for a single (agent, resource, verb) tuple.
      enum:
      - allow
      - narrow
      - approval
      - deny
      - na
    DestinationConfig:
      oneOf:
      - type: object
        description: Generic HTTP webhook.
        required:
        - config
        - kind
        properties:
          config:
            type: object
            description: Generic HTTP webhook.
            required:
            - url
            properties:
              secret_header:
                type:
                - string
                - 'null'
                description: Optional secret shipped in the `X-AAASM-Token` header.
              url:
                type: string
                description: Target URL (http or https).
          kind:
            type: string
            enum:
            - webhook
      - type: object
        description: Slack incoming webhook.
        required:
        - config
        - kind
        properties:
          config:
            type: object
            description: Slack incoming webhook.
            required:
            - webhook_url
            properties:
              channel_override:
                type:
                - string
                - 'null'
                description: Optional `#channel` or `@user` override.
              webhook_url:
                type: string
                description: Slack-issued incoming webhook URL.
          kind:
            type: string
            enum:
            - slack
      - type: object
        description: PagerDuty Events API v2.
        required:
        - config
        - kind
        properties:
          config:
            type: object
            description: PagerDuty Events API v2.
            required:
            - routing_key
            properties:
              routing_key:
                type: string
                description: Integration routing key.
              severity_map:
                type:
                - object
                - 'null'
                description: Optional severity-name mapping (AAASM severity → PagerDuty severity).
                additionalProperties:
                  type: string
                propertyNames:
                  type: string
          kind:
            type: string
            enum:
            - pagerduty
      - type: object
        description: OpsGenie REST alerts API.
        required:
        - config
        - kind
        properties:
          config:
            type: object
            description: OpsGenie REST alerts API.
            required:
            - api_key
            - team_id
            properties:
              api_key:
                type: string
                description: OpsGenie API key (GenieKey).
              team_id:
                type: string
                description: Target team identifier.
          kind:
            type: string
            enum:
            - opsgenie
      description: |-
        Per-kind configuration payload for a `Destination`.

        Serialised as `{ "kind": "...", "config": { ... } }` so that the API
        surface keeps configuration fields cleanly grouped under `config`.
    DestinationKind:
      type: string
      description: Kind of notification destination.
      enum:
      - webhook
      - slack
      - pagerduty
      - opsgenie
    DestinationResponse:
      allOf:
      - $ref: '#/components/schemas/DestinationConfig'
        description: Discriminated per-kind configuration (`kind` + `config`).
      - type: object
        required:
        - id
        - name
        - enabled
        - created_at
        - updated_at
        properties:
          created_at:
            type: string
            description: RFC 3339 creation timestamp.
          enabled:
            type: boolean
            description: Whether dispatch is allowed.
          id:
            type: string
            description: Stable identifier (`dst_<32 hex>`).
          name:
            type: string
            description: Operator-supplied display name.
          updated_at:
            type: string
            description: RFC 3339 last-mutation timestamp.
      description: Public JSON shape returned by every destination handler.
    EdgeListResponse:
      type: object
      description: Paginated list of directed edges for an agent.
      required:
      - agent_id
      - edges
      - count
      properties:
        agent_id:
          type: string
          description: The queried agent ID.
        count:
          type: integer
          description: Total number of edges returned.
          minimum: 0
        edges:
          type: array
          items:
            $ref: '#/components/schemas/EdgeResponse'
          description: The list of matching edges, newest first.
    EdgeResponse:
      type: object
      description: A single directed edge between two agents.
      required:
      - id
      - source_agent_id
      - target_agent_id
      - edge_type
      - created_at
      - is_cross_team
      properties:
        created_at:
          type: string
          description: ISO 8601 timestamp when the edge was recorded.
        edge_type:
          type: string
          description: Edge semantic type (snake_case).
        id:
          type: integer
          format: int64
          description: Auto-assigned edge identifier.
        is_cross_team:
          type: boolean
          description: Whether the edge crosses team boundaries.
        metadata:
          description: Optional freeform metadata attached at emission time.
        source_agent_id:
          type: string
          description: Hex-encoded source agent ID.
        target_agent_id:
          type: string
          description: Hex-encoded target agent ID.
    EffectivePermissionsResponse:
      type: object
      description: Effective permission set for an agent, with cascade provenance.
      required:
      - allow
      - deny
      - sources
      properties:
        allow:
          type: array
          items:
            type: string
          description: Capabilities allowed after merging the cascade (most-restrictive-wins).
        deny:
          type: array
          items:
            type: string
          description: Capabilities denied after merging the cascade.
        sources:
          type: array
          items:
            $ref: '#/components/schemas/PermissionSourceResponse'
          description: Per-scope contribution, in cascade order (broadest → narrowest).
    EventPayload:
      oneOf:
      - $ref: '#/components/schemas/ViolationPayload'
        description: Pipeline / violation event payload.
      - $ref: '#/components/schemas/ApprovalPayload'
        description: Approval request event payload.
      - $ref: '#/components/schemas/BudgetAlertPayload'
        description: Budget threshold alert payload.
      description: |-
        Discriminated union of all possible `GovernanceEvent.payload` shapes.

        The concrete variant is determined by the sibling `event_type` field:
        - `"violation"` → [`ViolationPayload`]
        - `"approval"` → [`ApprovalPayload`]
        - `"budget"` → [`BudgetAlertPayload`]
    EventType:
      type: string
      description: |-
        Classification of governance events for client-side filtering.

        Clients specify a comma-separated list of these values in the `types`
        query parameter to receive only matching events on the WebSocket.
      enum:
      - violation
      - approval
      - budget
    GenerateApiKeyRequest:
      type: object
      required:
      - label
      - scopes
      properties:
        label:
          type: string
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyScopeResponse'
    GeneratedApiKeyResponse:
      type: object
      description: |-
        One-shot reveal shape returned by generate / rotate. `secret` MUST be
        captured by the caller — the server does not store it.
      required:
      - id
      - prefix
      - secret
      properties:
        id:
          type: string
        prefix:
          type: string
        secret:
          type: string
    GovernanceEvent:
      type: object
      description: |-
        A governance event delivered to WebSocket subscribers.

        This is the unified JSON representation sent over the wire.
        It wraps events from all three domain channels (pipeline,
        approval, budget) into a single schema that clients can
        filter by [`EventType`].
      required:
      - id
      - event_type
      - agent_id
      - payload
      - timestamp
      properties:
        agent_id:
          type: string
          description: Agent that produced or is associated with the event.
        event_type:
          $ref: '#/components/schemas/EventType'
          description: Classification of the event for client-side filtering.
        id:
          type: integer
          format: int64
          description: Monotonically increasing event identifier.
          minimum: 0
        payload:
          $ref: '#/components/schemas/EventPayload'
          description: |-
            Event-specific payload whose schema depends on `event_type`:
            `ViolationPayload`, `ApprovalPayload`, or `BudgetAlertPayload`.
        timestamp:
          type: string
          description: Timestamp when the event was received by the API layer (ISO 8601).
    GraphNode:
      type: object
      description: A node in the topology subgraph.
      required:
      - id
      properties:
        id:
          type: string
          description: Hex-encoded agent ID.
    GraphResponse:
      type: object
      description: Subgraph reachable from an agent within a depth bound.
      required:
      - root_agent_id
      - nodes
      - edges
      properties:
        edges:
          type: array
          items:
            $ref: '#/components/schemas/EdgeResponse'
          description: All edges between nodes in this subgraph.
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
          description: All unique agent nodes reachable within `depth` hops.
        root_agent_id:
          type: string
          description: Root agent ID used for the BFS.
    HealthResponse:
      type: object
      description: Response body for the health endpoint.
      required:
      - status
      - version
      - api_version
      - uptime_secs
      - active_connections
      - pipeline_lag_ms
      - checks
      properties:
        active_connections:
          type: integer
          format: int64
          description: Number of currently active WebSocket/SSE connections.
        api_version:
          type: string
          description: API version prefix (e.g. `"v1"`).
        checks:
          type: object
          description: Per-subsystem health status. Each value is `"ok"` or `"degraded"`.
          additionalProperties:
            type: string
          propertyNames:
            type: string
        pipeline_lag_ms:
          type: integer
          format: int64
          description: Pipeline processing lag in milliseconds (placeholder, always 0 for now).
          minimum: 0
        status:
          type: string
          description: 'Liveness status string: `"ok"` when all subsystems healthy, `"degraded"` otherwise.'
        uptime_secs:
          type: integer
          format: int64
          description: Server uptime in seconds since startup.
          minimum: 0
        version:
          type: string
          description: Gateway version (semver from Cargo.toml).
    LineageStep:
      type: object
      description: |-
        One step in an agent's ancestry chain.

        # Example JSON
        ```json
        { "id": "root000000000000root000000000000", "name": "root", "depth": 0, "delegation_reason": null, "team_id": null }
        ```
      required:
      - id
      - name
      - depth
      properties:
        delegation_reason:
          type:
          - string
          - 'null'
          description: Reason the next agent in the chain was delegated from this node.
        depth:
          type: integer
          format: int32
          description: Delegation depth of this node.
          minimum: 0
        id:
          type: string
          description: Hex-encoded UUID of this ancestor (or the subject agent).
        name:
          type: string
          description: Human-readable name.
        team_id:
          type:
          - string
          - 'null'
          description: Team this node belongs to.
      example:
        delegation_reason: null
        depth: 0
        id: root000000000000root000000000000
        name: root
        team_id: null
    LogEntry:
      type: object
      description: JSON representation of an audit log entry.
      required:
      - seq
      - timestamp
      - agent_id
      - session_id
      - event_type
      - payload
      properties:
        agent_id:
          type: string
          description: Hex-encoded agent ID that produced this log entry.
        event_type:
          type: string
          description: Type of audit event.
        payload:
          type: string
          description: Pre-serialized JSON payload.
        seq:
          type: integer
          format: int64
          description: Monotonic sequence number within the session.
          minimum: 0
        session_id:
          type: string
          description: Hex-encoded session ID for the agent run.
        timestamp:
          type: string
          description: ISO 8601 timestamp of the event.
    OpActionAck:
      type: object
      description: |-
        Acknowledgement returned by the per-op lifecycle endpoints.

        The fields are deliberately minimal — they document what the
        gateway received, not the resulting state (which the dashboard
        observes via the WebSocket event stream).
      required:
      - op_id
      - action
      - accepted_at
      properties:
        accepted_at:
          type: string
          description: Server-side timestamp when the request was accepted (RFC 3339).
        action:
          type: string
          description: Action that was requested — one of `"pause"`, `"resume"`, `"terminate"`.
        op_id:
          type: string
          description: Operation id from the URL path.
    OpRecord:
      type: object
      description: Snapshot of a registered operation returned by the registry and API.
      required:
      - op_id
      - state
      - registered_at
      - updated_at
      properties:
        op_id:
          type: string
          description: Stable identifier supplied at registration time.
        registered_at:
          type: string
          description: RFC 3339 timestamp when the op was first registered.
        state:
          $ref: '#/components/schemas/OpState'
          description: Current lifecycle state.
        updated_at:
          type: string
          description: RFC 3339 timestamp of the most recent state change.
    OpState:
      type: string
      description: Lifecycle state of a registered in-flight operation.
      enum:
      - pending
      - running
      - paused
      - completing
      - terminated
    OverrideRecord:
      type: object
      description: |-
        A recorded capability override entry returned by
        `GET /api/v1/capability/override`.

        Each `POST /capability/override` call that successfully mutates at least
        one cell appends one of these records. The log is in-memory and lives as
        long as the server process; TTL-based expiry is not yet implemented.
      required:
      - id
      - agentIds
      - resourceId
      - verb
      - decision
      - createdAt
      - active
      properties:
        active:
          type: boolean
          description: |-
            Whether the override is still active. Always `true` in the current
            implementation (no TTL or explicit delete support yet).
        agentIds:
          type: array
          items:
            type: string
          description: Agent identifiers this override was applied to.
        createdAt:
          type: string
          description: ISO 8601 UTC timestamp when the override was applied.
        decision:
          $ref: '#/components/schemas/Decision'
          description: New decision recorded for that (resource, verb) pair.
        id:
          type: string
          description: Unique identifier for this override entry (UUID v4).
        resourceId:
          type: string
          description: Resource whose cell was overridden.
        verb:
          $ref: '#/components/schemas/Verb'
          description: Verb within the cell that was changed.
    PermissionSourceResponse:
      type: object
      description: Per-scope contribution to an agent's effective permissions.
      required:
      - scope
      - allow
      - deny
      properties:
        allow:
          type: array
          items:
            type: string
          description: Capability identifiers this scope explicitly allows.
        deny:
          type: array
          items:
            type: string
          description: Capability identifiers this scope explicitly denies.
        scope:
          type: string
          description: Wire-format scope label (e.g. `"global"`, `"team:platform"`).
    Policy:
      type: object
      description: A policy version shown in the dashboard Capability Matrix's policies tab.
      required:
      - id
      - name
      - version
      - scope
      - status
      - hits24h
      - affects
      - rules
      properties:
        affects:
          type: array
          items:
            type: string
        hits24h:
          type: integer
          format: int64
          description: Number of times this policy fired in the last 24 hours.
          minimum: 0
        id:
          type: string
        name:
          type: string
        rules:
          type: array
          items:
            $ref: '#/components/schemas/PolicyRule'
        scope:
          type: string
        status:
          $ref: '#/components/schemas/PolicyStatus'
        version:
          type: string
    PolicyResponse:
      type: object
      description: JSON representation of a governance policy version.
      required:
      - name
      - version
      - active
      - rule_count
      - policy_yaml
      properties:
        active:
          type: boolean
          description: Whether this is the currently active policy.
        name:
          type: string
          description: Policy name from metadata.
        policy_yaml:
          type: string
          description: |-
            Raw YAML content of this policy version. Empty string when the
            underlying snapshot is not retrievable from the history store
            (e.g. a policy loaded at startup before any history entry exists).
        rule_count:
          type: integer
          description: Number of rules in this policy version.
          minimum: 0
        version:
          type: string
          description: Policy version string.
    PolicyRule:
      type: object
      description: |-
        A single rule inside a policy — resource, verbs scoped, action, and an
        optional condition expression.
      required:
      - resource
      - verb
      - action
      - condition
      properties:
        action:
          type: string
        condition:
          type: string
        resource:
          type: string
        verb:
          type: array
          items:
            $ref: '#/components/schemas/Verb'
    PolicyStatus:
      type: string
      description: Lifecycle status of a policy version in the capability view.
      enum:
      - active
      - proposed
      - archived
    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details JSON body.
      required:
      - type
      - title
      - status
      properties:
        detail:
          type:
          - string
          - 'null'
          description: Human-readable explanation specific to this occurrence.
        instance:
          type:
          - string
          - 'null'
          description: URI reference identifying the specific occurrence.
        status:
          type: integer
          format: int32
          description: HTTP status code.
          minimum: 0
        title:
          type: string
          description: Short human-readable summary.
        type:
          type: string
          description: URI reference identifying the problem type.
      example:
        detail: 'No route matched: /unknown'
        instance: /unknown
        status: 404
        title: Not Found
        type: about:blank
    RecentActivityResponse:
      type: object
      required:
      - id
      - timestamp
      - action
      - target
      properties:
        action:
          type: string
        id:
          type: string
        target:
          type: string
        timestamp:
          type: string
    RecentEventResponse:
      type: object
      description: Summary of a recent event in the API response.
      required:
      - event_type
      - summary
      - timestamp
      properties:
        event_type:
          type: string
          description: Event type classification (e.g. "violation", "approval", "budget").
        summary:
          type: string
          description: Short human-readable summary.
        timestamp:
          type: string
          description: ISO 8601 timestamp when the event occurred.
    RecentTraceResponse:
      type: object
      description: Summary of a recent trace session for an agent.
      required:
      - session_id
      - timestamp
      properties:
        session_id:
          type: string
          description: Hex-encoded session UUID, usable with `aasm trace <session-id>`.
        timestamp:
          type: string
          description: ISO 8601 timestamp when the trace session started.
    RegisterOpRequest:
      type: object
      description: Request body for `POST /api/v1/ops` — register a new in-flight operation.
      required:
      - op_id
      properties:
        op_id:
          type: string
          description: Stable identifier for the operation, typically a `GovernanceEvent.id`.
    ReportEdgeRequest:
      type: object
      description: Request body for recording a new directed edge.
      required:
      - source_agent_id
      - target_agent_id
      - edge_type
      properties:
        edge_type:
          type: string
          description: Edge semantic type (e.g. `"messages"`, `"delegates_to"`).
        metadata_json:
          type:
          - string
          - 'null'
          description: Optional metadata JSON string.
        source_agent_id:
          type: string
          description: Hex-encoded source agent ID.
        target_agent_id:
          type: string
          description: Hex-encoded target agent ID.
    ReportEdgeResponse:
      type: object
      description: Response after recording a new edge.
      required:
      - id
      properties:
        id:
          type: integer
          format: int64
          description: Auto-assigned edge identifier.
    ResolveAlertRequest:
      type: object
      description: Request body for `POST /api/v1/alerts/:id/resolve`.
      properties:
        reason:
          type:
          - string
          - 'null'
          description: |-
            Optional human-readable note recorded with the resolution. The
            in-memory store does not persist this today but the field is
            accepted so CLI / dashboard clients can submit a reason.
    Resource:
      type: object
      description: |-
        A resource that an agent may interact with — one column family in the
        dashboard Capability Matrix.
      required:
      - id
      - name
      - group
      - paths
      properties:
        group:
          $ref: '#/components/schemas/ResourceGroup'
          description: Coarse group this resource belongs to.
        id:
          type: string
          description: Stable identifier (e.g. `"gmail"`, `"pg"`, `"shell"`).
        name:
          type: string
          description: Human-readable display name (e.g. `"Postgres"`).
        paths:
          type: array
          items:
            type: string
          description: Globbed paths covered by this resource (e.g. `["pg.public.*"]`).
    ResourceGroup:
      type: string
      description: Coarse group a resource belongs to, used for matrix column headings.
      enum:
      - comm
      - files
      - data
      - infra
      - code
    ResumeResponse:
      type: object
      description: Response from `POST /api/v1/agents/:id/resume`.
      required:
      - agent_id
      - previous_status
      - new_status
      properties:
        agent_id:
          type: string
          description: Hex-encoded agent UUID.
        new_status:
          type: string
          description: Agent status after the resume operation.
        previous_status:
          type: string
          description: Agent status before the resume operation.
    RoutingHistoryEntry:
      type: object
      description: One step in the routing history of an approval request.
      required:
      - at
      - action
      - to_role
      properties:
        action:
          type: string
          description: 'Whether this step was an initial routing or an escalation: `"routed"` or `"escalated"`.'
        at:
          type: integer
          format: int64
          description: Unix epoch timestamp (seconds) when this step occurred.
          minimum: 0
        from_role:
          type:
          - string
          - 'null'
          description: Role that previously held the request, if any.
        to_role:
          type: string
          description: Role the request was routed or escalated to.
    RoutingStatusInfo:
      type: object
      description: Structured routing metadata set by the approval router.
      required:
      - status
      - history
      properties:
        escalate_at:
          type:
          - integer
          - 'null'
          format: int64
          description: Unix timestamp (seconds) at which escalation is scheduled to fire.
          minimum: 0
        history:
          type: array
          items:
            $ref: '#/components/schemas/RoutingHistoryEntry'
          description: Full routing and escalation history for this request.
        routed_at:
          type:
          - integer
          - 'null'
          format: int64
          description: Unix timestamp (seconds) when the initial routing decision was recorded.
          minimum: 0
        status:
          type: string
          description: 'Routing status string: `"routed_to_team_admin"`, `"routed_to_org_admin"`, or `"escalated_to_<role>"`.'
        target_role:
          type:
          - string
          - 'null'
          description: Role the request is currently assigned to (e.g. `"TeamAdmin"`, `"OrgAdmin"`).
        target_team_id:
          type:
          - string
          - 'null'
          description: Team the request was routed to, if known.
    SampleCall:
      type: object
      description: |-
        A representative call sample shown alongside the matrix to explain the
        effect of the current (and any proposed) policy.
      required:
      - ts
      - agent
      - verb
      - resource
      - currentDecision
      properties:
        agent:
          type: string
        changeType:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ChangeType'
        currentDecision:
          $ref: '#/components/schemas/Decision'
        detail:
          type:
          - string
          - 'null'
        fpReason:
          type:
          - string
          - 'null'
          description: Free-form explanation for a `false-positive` change classification.
        proposedDecision:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/Decision'
        resource:
          type: string
        ts:
          type: string
        verb:
          $ref: '#/components/schemas/Verb'
    Scope:
      type: string
      description: |-
        Authorization scope level for API operations.

        Variants are ordered by privilege: `Read < Write < Admin`.
        A caller with `Admin` scope satisfies any scope requirement.
      enum:
      - read
      - write
      - admin
    SubtreeBurnResponse:
      type: object
      description: Response for `GET /api/v1/agents/{id}/subtree-burn`.
      required:
      - agent_id
      - period
      - points
      properties:
        agent_id:
          type: string
          description: Hex-encoded root agent ID.
        period:
          type: string
          description: 'Requested period: `"7d"` or `"30d"`.'
        points:
          type: array
          items:
            $ref: '#/components/schemas/DailyBurnPointResponse'
          description: Time series, ordered oldest → newest.
    SuspendRequest:
      type: object
      description: Request body for `POST /api/v1/agents/:id/suspend`.
      required:
      - reason
      properties:
        reason:
          type: string
          description: Reason for suspending the agent (logged for audit).
    SuspendResponse:
      type: object
      description: Response from `POST /api/v1/agents/:id/suspend`.
      required:
      - agent_id
      - previous_status
      - new_status
      properties:
        agent_id:
          type: string
          description: Hex-encoded agent UUID.
        new_status:
          type: string
          description: Agent status after the suspend operation.
        previous_status:
          type: string
          description: Agent status before the suspend operation.
    TeamCostEntry:
      type: object
      description: Per-team cost entry within the budget summary.
      required:
      - team_id
      - daily_spend_usd
      - date
      properties:
        daily_spend_usd:
          type: string
          description: Daily spend for this team in USD (sum of all member agent spends today).
        date:
          type: string
          description: Calendar date (YYYY-MM-DD) the daily spend applies to.
        monthly_spend_usd:
          type:
          - string
          - 'null'
          description: Total spend this month in USD for this team (if monthly tracking is enabled).
        team_id:
          type: string
          description: Team identifier.
    TeamSummary:
      type: object
      description: |-
        High-level statistics for a single team.

        # Example JSON
        ```json
        { "team_id": "team-alpha", "agent_count": 7, "root_agent_count": 1 }
        ```
      required:
      - team_id
      - agent_count
      - root_agent_count
      properties:
        agent_count:
          type: integer
          description: Total agents in this team.
          minimum: 0
        root_agent_count:
          type: integer
          description: Root agents (depth == 0) in this team.
          minimum: 0
        team_id:
          type: string
          description: Team identifier.
      example:
        agent_count: 7
        root_agent_count: 1
        team_id: team-alpha
    TeamTopology:
      type: object
      description: |-
        All agents belonging to a single team.

        # Example JSON
        ```json
        { "team_id": "team-alpha", "agent_count": 2, "members": [] }
        ```
      required:
      - team_id
      - agent_count
      - members
      properties:
        agent_count:
          type: integer
          description: Number of agents in this team (after filtering).
          minimum: 0
        members:
          type: array
          items:
            $ref: '#/components/schemas/AgentNode'
          description: Agents in this team.
        team_id:
          type: string
          description: Team identifier.
      example:
        agent_count: 2
        members: []
        team_id: team-alpha
    TestDestinationRequest:
      type: object
      description: Body for `POST /api/v1/alerts/destinations/{id}/test`.
      properties:
        message:
          type:
          - string
          - 'null'
          description: Optional message body; defaults to `"AAASM test fire"`.
        severity:
          type:
          - string
          - 'null'
          description: Optional severity label; defaults to `"LOW"`.
    TestDestinationResponse:
      type: object
      description: Response body for a successful test-fire.
      required:
      - delivered_at
      - connector_response_status
      - connector_response_body
      properties:
        connector_response_body:
          type: string
          description: Up-to-2048-byte snippet of the connector response body.
        connector_response_status:
          type: integer
          format: int32
          description: HTTP status the connector observed.
          minimum: 0
        delivered_at:
          type: string
          description: RFC 3339 timestamp when the connector reported success.
    TokenRequest:
      type: object
      description: Request body for `POST /auth/token`.
      properties:
        scopes:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/Scope'
          description: |-
            Requested scopes for the issued JWT.
            If omitted, the caller's full scopes are used.
    TokenResponse:
      type: object
      description: Response body for `POST /auth/token`.
      required:
      - token
      - expires_at
      - scopes
      properties:
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp when the token expires.
          minimum: 0
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/Scope'
          description: Scopes granted in the token.
        token:
          type: string
          description: The issued JWT token string.
    TopologyOverview:
      type: object
      description: |-
        Overview of the entire agent topology across all teams.

        # Example JSON
        ```json
        {
          "team_count": 2,
          "root_agent_count": 3,
          "total_agent_count": 12,
          "teams": [{ "team_id": "team-alpha", "agent_count": 7, "root_agent_count": 1 }],
          "standalone_root_agents": []
        }
        ```
      required:
      - team_count
      - root_agent_count
      - total_agent_count
      - teams
      - standalone_root_agents
      properties:
        root_agent_count:
          type: integer
          description: Number of root agents (depth == 0) across all teams.
          minimum: 0
        standalone_root_agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentNode'
          description: Root agents that are not assigned to any team, sorted by agent id.
        team_count:
          type: integer
          description: Number of teams with at least one registered agent.
          minimum: 0
        teams:
          type: array
          items:
            $ref: '#/components/schemas/TeamSummary'
          description: Per-team agent count summaries, sorted by team_id.
        total_agent_count:
          type: integer
          description: Total number of agents in the registry.
          minimum: 0
      example:
        root_agent_count: 3
        standalone_root_agents: []
        team_count: 2
        teams:
        - agent_count: 7
          root_agent_count: 1
          team_id: team-alpha
        total_agent_count: 12
    TopologyStats:
      type: object
      description: |-
        Aggregate topology statistics across all registered agents.

        # Example JSON
        ```json
        {
          "total_agents": 15,
          "root_agent_count": 3,
          "max_depth": 4,
          "active_count": 12,
          "suspended_count": 2,
          "deregistered_count": 1,
          "team_count": 2,
          "team_sizes": { "team-alpha": 8, "team-beta": 4 },
          "depth_histogram": { "0": 3, "1": 7, "2": 5 },
          "team_size_histogram": { "4": 1, "8": 1 },
          "spawn_count_histogram": { "0": 8, "2": 4, "4": 1 },
          "orphan_count": 2,
          "avg_children_per_parent": 2.5
        }
        ```
      required:
      - total_agents
      - root_agent_count
      - max_depth
      - active_count
      - suspended_count
      - deregistered_count
      - team_count
      - team_sizes
      - depth_histogram
      - team_size_histogram
      - spawn_count_histogram
      - orphan_count
      - avg_children_per_parent
      properties:
        active_count:
          type: integer
          description: Agents currently in `Active` status.
          minimum: 0
        avg_children_per_parent:
          type: number
          format: double
          description: Average number of children across all agents that have at least one child.
        depth_histogram:
          type: object
          description: Agent count per depth level (depth → count).
          additionalProperties:
            type: integer
            format: int32
            minimum: 0
          propertyNames:
            type: string
        deregistered_count:
          type: integer
          description: Agents in `Deregistered` status.
          minimum: 0
        max_depth:
          type: integer
          format: int32
          description: Maximum observed delegation depth.
          minimum: 0
        orphan_count:
          type: integer
          description: Agents that have no team assignment and are not root agents (depth > 0).
          minimum: 0
        root_agent_count:
          type: integer
          description: Number of root agents (depth == 0).
          minimum: 0
        spawn_count_histogram:
          type: object
          description: Number of agents per child-count bucket (child_count → agent_count).
          additionalProperties:
            type: integer
            format: int32
            minimum: 0
          propertyNames:
            type: string
        suspended_count:
          type: integer
          description: Agents currently in `Suspended` status.
          minimum: 0
        team_count:
          type: integer
          description: Number of teams with at least one agent.
          minimum: 0
        team_size_histogram:
          type: object
          description: Number of teams per team-size bucket (team_size → team_count).
          additionalProperties:
            type: integer
            format: int32
            minimum: 0
          propertyNames:
            type: string
        team_sizes:
          type: object
          description: Agent count per team (team_id → count).
          additionalProperties:
            type: integer
            minimum: 0
          propertyNames:
            type: string
        total_agents:
          type: integer
          description: Total agents in the registry.
          minimum: 0
      example:
        active_count: 12
        avg_children_per_parent: 2.5
        depth_histogram:
          '0': 3
          '1': 7
          '2': 5
        deregistered_count: 1
        max_depth: 4
        orphan_count: 2
        root_agent_count: 3
        spawn_count_histogram:
          '0': 8
          '2': 4
          '4': 1
        suspended_count: 2
        team_count: 2
        team_size_histogram:
          '4': 1
          '8': 1
        team_sizes:
          team-alpha: 8
          team-beta: 4
        total_agents: 15
    TraceResponse:
      type: object
      description: Full trace for one agent session.
      required:
      - session_id
      - agent_id
      - spans
      properties:
        agent_id:
          type: string
          description: Agent that produced this trace.
        session_id:
          type: string
          description: Session identifier.
        spans:
          type: array
          items:
            $ref: '#/components/schemas/TraceSpan'
          description: Ordered list of spans in the session.
    TraceSpan:
      type: object
      description: A single span within an agent session trace.
      required:
      - span_id
      - operation
      - start_time
      properties:
        decision:
          type:
          - string
          - 'null'
          description: Governance decision result for this span.
        end_time:
          type:
          - string
          - 'null'
          description: End time of the span (ISO 8601, if completed).
        operation:
          type: string
          description: Operation name.
        parent_span_id:
          type:
          - string
          - 'null'
          description: Parent span identifier (links to the calling action).
        span_id:
          type: string
          description: Span identifier.
        start_time:
          type: string
          description: Start time of the span (ISO 8601).
    UpdateDestinationRequest:
      allOf:
      - oneOf:
        - type: 'null'
        - $ref: '#/components/schemas/DestinationConfig'
          description: |-
            New discriminated configuration. When supplied it fully replaces
            the existing config and is re-validated.
      - type: object
        properties:
          enabled:
            type:
            - boolean
            - 'null'
            description: New enabled flag.
          name:
            type:
            - string
            - 'null'
            description: New display name.
      description: |-
        Body for `PUT /api/v1/alerts/destinations/{id}`.

        All fields are optional — supplying just `enabled` toggles dispatch
        without touching the configuration payload.
    Verb:
      type: string
      description: Verb a capability cell scopes its decision to.
      enum:
      - read
      - write
      - delete
      - exec
    ViolationNode:
      type: object
      description: A single node in the policy-violations-by-lineage heatmap.
      required:
      - agent_id
      - violation_count
      - top_policies
      properties:
        agent_id:
          type: string
          description: Hex-encoded agent ID.
        depth:
          type:
          - integer
          - 'null'
          format: int32
          description: Delegation depth (0 = root agent).
          minimum: 0
        parent_agent_id:
          type:
          - string
          - 'null'
          description: Hex-encoded parent agent ID, if known.
        team_id:
          type:
          - string
          - 'null'
          description: Team the agent belongs to, if registered.
        top_policies:
          type: array
          items:
            type: string
          description: Top 3 most-frequently violated policy rules in the window.
        violation_count:
          type: integer
          format: int64
          description: Number of `PolicyViolation` audit events in the requested window.
          minimum: 0
    ViolationPayload:
      oneOf:
      - type: object
        description: A governance audit event enriched with runtime metadata.
        required:
        - source
        - received_at_ms
        - sequence_number
        - kind
        properties:
          call_stack:
            type:
            - array
            - 'null'
            items:
              $ref: '#/components/schemas/CallStackNode'
            description: |-
              Hierarchical call stack for the operation (LLM / tool / result
              steps). Omitted when the producer did not record a stack.
          kind:
            type: string
            enum:
            - audit
          latency_ms:
            type:
            - integer
            - 'null'
            format: int64
            description: |-
              Observed latency in milliseconds. Optional today — populated once
              the audit pipeline tracks per-action duration end-to-end.
            minimum: 0
          op_type:
            type:
            - string
            - 'null'
            description: |-
              Operation kind from the underlying `AuditEvent.action_type` — one of
              `"llm_call"`, `"tool_call"`, `"file_op"`, `"network"`, `"process"`,
              `"spawn"`, or `"unknown"` when unspecified. Drives the Live Ops
              dashboard's per-row "op type" column.
          received_at_ms:
            type: integer
            format: int64
            description: Unix milliseconds when the pipeline received the event.
          resource:
            type:
            - string
            - 'null'
            description: |-
              Target resource derived from the action's `detail` variant — e.g.
              `LLMCallDetail.model_name`, `ToolCallDetail.tool_name`,
              `FileOpDetail.path`. Drives the Live Ops "resource" column.
          sequence_number:
            type: integer
            format: int64
            description: Monotonic sequence number assigned by the pipeline.
            minimum: 0
          source:
            type: string
            description: 'Source that delivered the event: `"sdk"`, `"ebpf"`, or `"proxy"`.'
          status:
            type:
            - string
            - 'null'
            description: |-
              Operation lifecycle status mapped from the proto `Decision`:
              `"running"` (allow / redact), `"blocked"` (deny), `"pending"`
              (awaiting human approval).
          team:
            type:
            - string
            - 'null'
            description: |-
              Team identifier from the agent's lineage context. Empty for
              legacy events and root agents without a team set.
      - type: object
        description: An interception layer became unavailable.
        required:
        - layer
        - reason
        - remaining_layers
        - kind
        properties:
          kind:
            type: string
            enum:
            - layer_degradation
          layer:
            type: string
            description: Name of the degraded layer (e.g. `"ebpf"`, `"proxy"`).
          reason:
            type: string
            description: Human-readable reason for the degradation.
          remaining_layers:
            type: array
            items:
              type: string
            description: Remaining active layers after degradation.
      description: |-
        Payload for `event_type: "violation"` events.

        Represents a governance audit event from the pipeline — either an
        action that violated policy or an interception layer degradation.
    ViolationsByLineageResponse:
      type: object
      description: Response for `GET /api/v1/audit/violations-by-lineage`.
      required:
      - nodes
      - window_secs
      - generated_at
      properties:
        generated_at:
          type: string
          description: ISO 8601 UTC timestamp when this response was generated.
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ViolationNode'
          description: Heatmap nodes — one entry per agent that recorded at least one violation.
        window_secs:
          type: integer
          format: int64
          description: Time window used for aggregation, in seconds.
          minimum: 0
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API key (`aa_…` prefix) or JWT bearer token
tags:
- name: health
  description: Liveness and readiness probes
- name: agents
  description: Agent management
- name: logs
  description: Audit log queries
- name: traces
  description: Agent session traces
- name: policies
  description: Policy management
- name: approvals
  description: Human-in-the-loop approvals
- name: costs
  description: Cost and budget tracking
- name: alerts
  description: Governance alerts
- name: alert-destinations
  description: Notification destinations — CRUD + test
- name: auth
  description: Authentication and token issuance
- name: events
  description: Real-time event streaming via WebSocket
- name: alerts-stream
  description: Real-time alert lifecycle WebSocket stream (subprotocol aaasm-alerts-v1) — AAASM-1389
- name: topology
  description: Agent topology — tree, team, lineage, statistics, and mesh edge queries
- name: ops
  description: Per-operation lifecycle actions (pause / resume / terminate)
- name: capability
  description: Dashboard Capability Matrix — agent × resource × verb × decision view
- name: iam
  description: Identity & Access — API key list / generate / revoke / rotate
- name: audit
  description: Audit log aggregations — violation heatmaps and lineage analytics
